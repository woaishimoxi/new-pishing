<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>域名管理 - 钓鱼邮件检测系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <style>
        :root {
            --bg-primary: #f5f5f7;
            --bg-secondary: #e8e8ed;
            --bg-card: #ffffff;
            --bg-input: #f5f5f7;
            --border-color: rgba(0, 0, 0, 0.08);
            --border-hover: rgba(0, 113, 227, 0.3);
            --text-primary: #1d1d1f;
            --text-secondary: #6e6e73;
            --text-muted: #86868b;
            --blue: #0071e3;
            --blue-light: #00c7be;
            --green: #34c759;
            --red: #ff3b30;
            --amber: #ff9500;
            --gradient-primary: linear-gradient(135deg, #0071e3 0%, #00c7be 100%);
            --gradient-success: linear-gradient(135deg, #34c759 0%, #30d158 100%);
            --gradient-danger: linear-gradient(135deg, #ff3b30 0%, #ff9500 100%);
            --shadow-card: 0 2px 12px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 8px 30px rgba(0, 0, 0, 0.12);
            --radius-sm: 10px;
            --radius-md: 14px;
            --radius-lg: 18px;
        }

        * { box-sizing: border-box; }

        body {
            background: linear-gradient(180deg, #f5f5f7 0%, #ffffff 100%);
            background-attachment: fixed;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            color: var(--text-primary);
            font-weight: 400;
            letter-spacing: -0.01em;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .navbar-custom {
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 0.5px solid rgba(0, 0, 0, 0.1);
            padding: 0.75rem 0;
            box-shadow: 0 1px 0 rgba(0, 0, 0, 0.05);
        }

        .navbar-brand {
            font-weight: 600;
            font-size: 1.05rem;
            text-decoration: none;
            color: var(--text-primary);
            letter-spacing: -0.02em;
            transition: color 0.3s;
        }

        .navbar-brand:hover {
            color: var(--blue);
        }

        .navbar-brand i {
            color: var(--blue);
        }

        .main-container {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .page-header {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }

        .page-header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 200px;
            height: 2px;
            background: var(--gradient-primary);
        }

        .page-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            letter-spacing: 2px;
        }

        .page-title i {
            color: var(--blue);
        }

        .page-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin: 0;
        }

        .card-custom {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card-custom::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-primary);
        }

        .card-custom:hover {
            border-color: var(--border-hover);
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .card-header-custom {
            padding: 1.125rem 1.25rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(59, 130, 246, 0.03);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0 !important;
        }

        .card-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-primary);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            letter-spacing: 1px;
        }

        .card-title i {
            color: var(--blue);
        }

        .card-body-custom {
            padding: 1.25rem;
        }

        .stat-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.375rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            border: 1px solid;
        }

        .stat-badge.green {
            background: rgba(16, 185, 129, 0.1);
            color: var(--green);
            border-color: rgba(16, 185, 129, 0.3);
        }

        .stat-badge.red {
            background: rgba(239, 68, 68, 0.1);
            color: var(--red);
            border-color: rgba(239, 68, 68, 0.3);
        }

        .stat-badge.blue {
            background: rgba(37, 99, 235, 0.1);
            color: var(--blue);
            border-color: rgba(37, 99, 235, 0.3);
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 1.25rem;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
        }

        .stat-card.green::before { background: var(--gradient-success); }
        .stat-card.red::before { background: var(--gradient-danger); }
        .stat-card.blue::before { background: var(--gradient-primary); }

        .stat-card:hover {
            border-color: var(--border-hover);
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.75rem;
            font-weight: 600;
        }

        .stat-value.green { color: var(--green); }
        .stat-value.red { color: var(--red); }

        .domain-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .domain-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.625rem 0;
            border-bottom: 1px solid var(--border-color);
        }

        .domain-item:last-child {
            border-bottom: none;
        }

        .domain-name {
            font-size: 0.875rem;
            color: var(--text-primary);
            font-family: 'Rajdhani', monospace;
        }

        .domain-name.danger {
            color: var(--red);
        }

        .domain-delete {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .domain-delete:hover {
            background: var(--red);
            color: white;
            border-color: var(--red);
        }

        .form-control-custom {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 0.5rem 0.75rem;
            font-size: 0.875rem;
            color: var(--text-primary);
            transition: all 0.3s;
        }

        .form-control-custom:focus {
            background: #ffffff;
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
            color: var(--text-primary);
        }

        .form-control-custom::placeholder {
            color: var(--text-muted);
        }

        .btn-custom {
            padding: 0.5rem 1rem;
            border-radius: var(--radius-md);
            font-size: 0.8125rem;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid transparent;
            font-family: 'Rajdhani', sans-serif;
            letter-spacing: 0.5px;
        }

        .btn-primary-custom {
            background: var(--gradient-primary);
            border: none;
            color: white;
            font-weight: 600;
            box-shadow: 0 2px 10px rgba(37, 99, 235, 0.3);
        }

        .btn-primary-custom:hover {
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
            transform: translateY(-2px);
            color: white;
        }

        .btn-danger-custom {
            background: var(--gradient-danger);
            border: none;
            color: white;
            box-shadow: 0 2px 10px rgba(239, 68, 68, 0.3);
        }

        .btn-danger-custom:hover {
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
            transform: translateY(-2px);
            color: white;
        }

        .btn-outline-custom {
            border: 1px solid var(--border-color);
            background: white;
            color: var(--text-secondary);
        }

        .btn-outline-custom:hover {
            border-color: var(--blue);
            color: var(--blue);
            background: rgba(37, 99, 235, 0.05);
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            opacity: 0.5;
        }

        .tabs-custom {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 1rem;
        }

        .tab-item {
            padding: 0.75rem 1.25rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
            border-bottom: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-item:hover {
            color: var(--text-primary);
        }

        .tab-item.active {
            color: var(--blue);
            border-bottom-color: var(--blue);
        }

        .alert-custom {
            padding: 0.75rem 1rem;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            margin-bottom: 1rem;
            border: 1px solid;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--green);
            border-color: rgba(16, 185, 129, 0.3);
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--red);
            border-color: rgba(239, 68, 68, 0.3);
        }

        .form-label {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gradient-primary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--blue);
        }
    </style>
</head>
<body>
    <nav class="navbar-custom">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="/">
                <i class="bi bi-shield-check me-2"></i>
                PHISHING DETECTOR
            </a>
            <div class="d-flex gap-2">
                <a href="/" class="btn btn-outline-custom btn-custom">
                    <i class="bi bi-house me-1"></i>返回首页
                </a>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="stat-card green">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div class="stat-label">白名单域名</div>
                            <div class="stat-value green" id="whitelist-count">0</div>
                        </div>
                        <span class="stat-badge green">
                            <i class="bi bi-shield-check"></i> 可信
                        </span>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card red">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div class="stat-label">黑名单域名</div>
                            <div class="stat-value red" id="blacklist-domain-count">0</div>
                        </div>
                        <span class="stat-badge red">
                            <i class="bi bi-shield-x"></i> 已拦截
                        </span>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card red">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div class="stat-label">黑名单IP</div>
                            <div class="stat-value red" id="blacklist-ip-count">0</div>
                        </div>
                        <span class="stat-badge red">
                            <i class="bi bi-wifi-off"></i> 已拦截
                        </span>
                    </div>
                </div>
            </div>
        </div>

        <div id="alert-container"></div>

        <div class="row g-4">
            <div class="col-lg-5">
                <div class="card-custom">
                    <div class="card-header-custom">
                        <h5 class="card-title">
                            <i class="bi bi-plus-circle"></i>
                            添加域名/IP
                        </h5>
                    </div>
                    <div class="card-body-custom">
                        <div class="tabs-custom">
                            <div class="tab-item active" onclick="switchTab('whitelist')">添加白名单</div>
                            <div class="tab-item" onclick="switchTab('blacklist')">添加黑名单</div>
                        </div>

                        <div id="whitelist-form">
                            <div class="mb-3">
                                <label class="form-label">域名（每行一个）</label>
                                <textarea class="form-control form-control-custom" id="whitelist-domains" rows="5" 
                                    placeholder="example.com&#10;another-domain.com&#10;https://trusted.com"></textarea>
                            </div>
                            <button class="btn btn-primary-custom btn-custom w-100" onclick="addWhitelist()">
                                <i class="bi bi-plus-lg me-1"></i>添加到白名单
                            </button>
                        </div>

                        <div id="blacklist-form" style="display: none;">
                            <div class="mb-3">
                                <label class="form-label">域名（每行一个）</label>
                                <textarea class="form-control form-control-custom" id="blacklist-domains" rows="3" 
                                    placeholder="malicious.com&#10;phishing-site.com"></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">IP地址（每行一个）</label>
                                <textarea class="form-control form-control-custom" id="blacklist-ips" rows="3" 
                                    placeholder="192.168.1.100&#10;10.0.0.1"></textarea>
                            </div>
                            <button class="btn btn-danger-custom btn-custom w-100" onclick="addBlacklist()">
                                <i class="bi bi-plus-lg me-1"></i>添加到黑名单
                            </button>
                        </div>
                    </div>
                </div>

                <div class="card-custom">
                    <div class="card-body-custom">
                        <button class="btn btn-outline-custom btn-custom w-100 mb-2" onclick="reloadConfig()">
                            <i class="bi bi-arrow-clockwise me-1"></i>重新加载配置
                        </button>
                        <button class="btn btn-outline-custom btn-custom w-100" onclick="refreshStats()">
                            <i class="bi bi-arrow-repeat me-1"></i>刷新统计
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-lg-7">
                <div class="card-custom">
                    <div class="card-header-custom">
                        <h5 class="card-title">
                            <i class="bi bi-list-check" style="color: var(--green);"></i>
                            白名单列表
                        </h5>
                        <span class="stat-badge green" id="whitelist-badge">0 个域名</span>
                    </div>
                    <div class="card-body-custom">
                        <div class="domain-list" id="whitelist-list">
                            <div class="empty-state">
                                <i class="bi bi-inbox"></i>
                                <div>暂无白名单域名</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card-custom">
                    <div class="card-header-custom">
                        <h5 class="card-title">
                            <i class="bi bi-ban" style="color: var(--red);"></i>
                            黑名单列表
                        </h5>
                        <span class="stat-badge red" id="blacklist-badge">0 个域名</span>
                    </div>
                    <div class="card-body-custom">
                        <div class="tabs-custom" style="margin-bottom: 0.5rem;">
                            <div class="tab-item active" style="padding: 0.5rem 1rem; font-size: 0.8rem;" onclick="showBlacklistTab('domains')">域名</div>
                            <div class="tab-item" style="padding: 0.5rem 1rem; font-size: 0.8rem;" onclick="showBlacklistTab('ips')">IP地址</div>
                        </div>
                        <div class="domain-list" id="blacklist-domains-list">
                            <div class="empty-state">
                                <i class="bi bi-inbox"></i>
                                <div>暂无黑名单域名</div>
                            </div>
                        </div>
                        <div class="domain-list" id="blacklist-ips-list" style="display: none;">
                            <div class="empty-state">
                                <i class="bi bi-inbox"></i>
                                <div>暂无黑名单IP</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentTab = 'whitelist';
        let blacklistTab = 'domains';
        let whitelistData = [];
        let blacklistDomains = [];
        let blacklistIPs = [];

        document.addEventListener('DOMContentLoaded', function() {
            refreshStats();
        });

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('#whitelist-form, #blacklist-form').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.tabs-custom .tab-item').forEach(el => el.classList.remove('active'));
            
            if (tab === 'whitelist') {
                document.getElementById('whitelist-form').style.display = 'block';
                document.querySelector('.tabs-custom .tab-item:first-child').classList.add('active');
            } else {
                document.getElementById('blacklist-form').style.display = 'block';
                document.querySelector('.tabs-custom .tab-item:last-child').classList.add('active');
            }
        }

        function showBlacklistTab(tab) {
            blacklistTab = tab;
            if (tab === 'domains') {
                document.getElementById('blacklist-domains-list').style.display = 'block';
                document.getElementById('blacklist-ips-list').style.display = 'none';
            } else {
                document.getElementById('blacklist-domains-list').style.display = 'none';
                document.getElementById('blacklist-ips-list').style.display = 'block';
            }
        }

        function showAlert(message, type = 'success') {
            const container = document.getElementById('alert-container');
            container.innerHTML = `
                <div class="alert-custom alert-${type}">
                    <i class="bi bi-${type === 'success' ? 'check-circle' : 'exclamation-circle'} me-2"></i>
                    ${message}
                </div>
            `;
            setTimeout(() => container.innerHTML = '', 3000);
        }

        async function refreshStats() {
            try {
                const response = await fetch('/api/domains/stats');
                const data = await response.json();
                
                document.getElementById('whitelist-count').textContent = data.trusted_domains || 0;
                document.getElementById('blacklist-domain-count').textContent = data.blacklisted_domains || 0;
                document.getElementById('blacklist-ip-count').textContent = data.blacklisted_ips || 0;
                
                whitelistData = data.trusted_domains_list || [];
                blacklistDomains = data.blacklisted_domains_list || [];
                blacklistIPs = data.blacklisted_ips_list || [];
                
                renderWhitelist();
                renderBlacklistDomains();
                renderBlacklistIPs();
                
                document.getElementById('whitelist-badge').textContent = `${whitelistData.length} 个域名`;
                document.getElementById('blacklist-badge').textContent = `${blacklistDomains.length + blacklistIPs.length} 项`;
                
            } catch (e) {
                showAlert('加载失败: ' + e.message, 'error');
            }
        }

        function renderWhitelist() {
            const container = document.getElementById('whitelist-list');
            if (whitelistData.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="bi bi-inbox"></i><div>暂无白名单域名</div></div>';
                return;
            }
            
            container.innerHTML = whitelistData.map(domain => `
                <div class="domain-item">
                    <span class="domain-name">${domain}</span>
                    <button class="domain-delete" onclick="deleteWhitelist('${domain}')" title="删除">
                        <i class="bi bi-trash" style="font-size: 0.75rem;"></i>
                    </button>
                </div>
            `).join('');
        }

        function renderBlacklistDomains() {
            const container = document.getElementById('blacklist-domains-list');
            if (blacklistDomains.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="bi bi-inbox"></i><div>暂无黑名单域名</div></div>';
                return;
            }
            
            container.innerHTML = blacklistDomains.map(domain => `
                <div class="domain-item">
                    <span class="domain-name danger">${domain}</span>
                    <button class="domain-delete" onclick="deleteBlacklistDomain('${domain}')" title="删除">
                        <i class="bi bi-trash" style="font-size: 0.75rem;"></i>
                    </button>
                </div>
            `).join('');
        }

        function renderBlacklistIPs() {
            const container = document.getElementById('blacklist-ips-list');
            if (blacklistIPs.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="bi bi-inbox"></i><div>暂无黑名单IP</div></div>';
                return;
            }
            
            container.innerHTML = blacklistIPs.map(ip => `
                <div class="domain-item">
                    <span class="domain-name danger">${ip}</span>
                    <button class="domain-delete" onclick="deleteBlacklistIP('${ip}')" title="删除">
                        <i class="bi bi-trash" style="font-size: 0.75rem;"></i>
                    </button>
                </div>
            `).join('');
        }

        async function addWhitelist() {
            const input = document.getElementById('whitelist-domains').value;
            const domains = input.split('\n').map(d => d.trim()).filter(d => d);
            
            if (domains.length === 0) {
                showAlert('请输入域名', 'error');
                return;
            }
            
            try {
                const response = await fetch('/api/domains/whitelist', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ domains })
                });
                
                const data = await response.json();
                if (data.success) {
                    showAlert(data.message, 'success');
                    document.getElementById('whitelist-domains').value = '';
                    refreshStats();
                } else {
                    showAlert(data.error || '添加失败', 'error');
                }
            } catch (e) {
                showAlert('添加失败: ' + e.message, 'error');
            }
        }

        async function deleteWhitelist(domain) {
            if (!confirm(`确定删除白名单域名: ${domain}?`)) return;
            
            try {
                const response = await fetch('/api/domains/whitelist', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ domains: [domain] })
                });
                
                const data = await response.json();
                if (data.success) {
                    showAlert('删除成功', 'success');
                    refreshStats();
                } else {
                    showAlert(data.error || '删除失败', 'error');
                }
            } catch (e) {
                showAlert('删除失败: ' + e.message, 'error');
            }
        }

        async function addBlacklist() {
            const domainsInput = document.getElementById('blacklist-domains').value;
            const ipsInput = document.getElementById('blacklist-ips').value;
            
            const domains = domainsInput.split('\n').map(d => d.trim()).filter(d => d);
            const ips = ipsInput.split('\n').map(ip => ip.trim()).filter(ip => ip);
            
            if (domains.length === 0 && ips.length === 0) {
                showAlert('请输入域名或IP', 'error');
                return;
            }
            
            try {
                const response = await fetch('/api/domains/blacklist', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ domains, ips })
                });
                
                const data = await response.json();
                if (data.success) {
                    showAlert(data.message, 'success');
                    document.getElementById('blacklist-domains').value = '';
                    document.getElementById('blacklist-ips').value = '';
                    refreshStats();
                } else {
                    showAlert(data.error || '添加失败', 'error');
                }
            } catch (e) {
                showAlert('添加失败: ' + e.message, 'error');
            }
        }

        async function deleteBlacklistDomain(domain) {
            if (!confirm(`确定删除黑名单域名: ${domain}?`)) return;
            
            try {
                const response = await fetch('/api/domains/blacklist', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ domains: [domain] })
                });
                
                const data = await response.json();
                if (data.success) {
                    showAlert('删除成功', 'success');
                    refreshStats();
                } else {
                    showAlert(data.error || '删除失败', 'error');
                }
            } catch (e) {
                showAlert('删除失败: ' + e.message, 'error');
            }
        }

        async function deleteBlacklistIP(ip) {
            if (!confirm(`确定删除黑名单IP: ${ip}?`)) return;
            
            try {
                const response = await fetch('/api/domains/blacklist', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ips: [ip] })
                });
                
                const data = await response.json();
                if (data.success) {
                    showAlert('删除成功', 'success');
                    refreshStats();
                } else {
                    showAlert(data.error || '删除失败', 'error');
                }
            } catch (e) {
                showAlert('删除失败: ' + e.message, 'error');
            }
        }

        async function reloadConfig() {
            try {
                const response = await fetch('/api/domains/reload', { method: 'POST' });
                const data = await response.json();
                if (data.success) {
                    showAlert('配置已重新加载', 'success');
                    refreshStats();
                } else {
                    showAlert(data.error || '重新加载失败', 'error');
                }
            } catch (e) {
                showAlert('重新加载失败: ' + e.message, 'error');
            }
        }
    </script>
