<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据大屏 - 钓鱼邮件检测系统</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            padding: 1rem;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            background: rgba(30, 41, 59, 0.8);
            border-radius: 12px;
            margin-bottom: 1rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .header h1 {
            font-size: 1.25rem;
            background: linear-gradient(90deg, #3b82f6, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .live-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #10b981;
            font-size: 0.875rem;
        }
        
        .live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            50% { box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
        }
        
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        .stat-card {
            background: rgba(30, 41, 59, 0.8);
            border-radius: 12px;
            padding: 1.25rem;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
        }
        
        .stat-card.blue::before { background: #3b82f6; }
        .stat-card.red::before { background: #ef4444; }
        .stat-card.green::before { background: #10b981; }
        .stat-card.amber::before { background: #f59e0b; }
        
        .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            margin-bottom: 0.75rem;
        }
        
        .stat-card.blue .stat-icon { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
        .stat-card.red .stat-icon { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .stat-card.green .stat-icon { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .stat-card.amber .stat-icon { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        
        .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
        }
        
        .stat-card.blue .stat-value { color: #3b82f6; }
        .stat-card.red .stat-value { color: #ef4444; }
        .stat-card.green .stat-value { color: #10b981; }
        .stat-card.amber .stat-value { color: #f59e0b; }
        
        .stat-label {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 0.25rem;
        }
        
        .stat-trend {
            font-size: 0.7rem;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        
        .stat-trend.up { color: #10b981; }
        .stat-trend.down { color: #ef4444; }
        
        .charts-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        .chart-card {
            background: rgba(30, 41, 59, 0.8);
            border-radius: 12px;
            padding: 1.25rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .chart-title {
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .chart-title i { color: #3b82f6; }
        
        .chart-container {
            height: 200px;
            position: relative;
        }
        
        .bottom-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        
        .threat-feed {
            max-height: 250px;
            overflow-y: auto;
        }
        
        .threat-item {
            display: flex;
            gap: 0.75rem;
            padding: 0.75rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .threat-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
            flex-shrink: 0;
        }
        
        .threat-icon.danger { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .threat-icon.warning { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .threat-icon.success { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        
        .threat-title {
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .threat-info {
            font-size: 0.7rem;
            color: #94a3b8;
        }
        
        .threat-time {
            font-size: 0.65rem;
            color: #64748b;
            margin-left: auto;
        }
        
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1.5rem;
            background: rgba(30, 41, 59, 0.8);
            border-radius: 12px;
            margin-top: 1rem;
            font-size: 0.75rem;
            color: #94a3b8;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .footer a {
            color: #94a3b8;
            text-decoration: none;
            margin-left: 1rem;
        }
        
        .footer a:hover { color: #3b82f6; }
        
        @media (max-width: 1024px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .charts-row { grid-template-columns: 1fr; }
            .bottom-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1><i class="bi bi-shield-check me-2"></i>钓鱼邮件检测系统 - 实时监控大屏</h1>
        <div style="display: flex; align-items: center; gap: 2rem;">
            <div class="live-indicator">
                <span class="live-dot"></span>
                <span>实时监控</span>
            </div>
            <div id="currentTime" style="font-size: 0.875rem;"></div>
        </div>
    </header>
    
    <!-- 统计卡片 -->
    <div class="stats-row">
        <div class="stat-card blue">
            <div class="stat-icon"><i class="bi bi-envelope"></i></div>
            <div class="stat-value" id="totalCount">0</div>
            <div class="stat-label">今日检测</div>
            <div class="stat-trend up"><i class="bi bi-arrow-up"></i> +12%</div>
        </div>
        <div class="stat-card red">
            <div class="stat-icon"><i class="bi bi-shield-x"></i></div>
            <div class="stat-value" id="phishingCount">0</div>
            <div class="stat-label">拦截钓鱼</div>
            <div class="stat-trend up"><i class="bi bi-arrow-up"></i> +5%</div>
        </div>
        <div class="stat-card green">
            <div class="stat-icon"><i class="bi bi-check-circle"></i></div>
            <div class="stat-value" id="safeCount">0</div>
            <div class="stat-label">安全邮件</div>
            <div class="stat-trend up"><i class="bi bi-arrow-up"></i> +15%</div>
        </div>
        <div class="stat-card amber">
            <div class="stat-icon"><i class="bi bi-question-circle"></i></div>
            <div class="stat-value" id="suspiciousCount">0</div>
            <div class="stat-label">可疑邮件</div>
            <div class="stat-trend down"><i class="bi bi-arrow-down"></i> -3%</div>
        </div>
    </div>
    
    <!-- 图表区域 -->
    <div class="charts-row">
        <div class="chart-card">
            <div class="chart-title"><i class="bi bi-graph-up"></i>检测趋势（近7天）</div>
            <div class="chart-container"><canvas id="trendChart"></canvas></div>
        </div>
        <div class="chart-card">
            <div class="chart-title"><i class="bi bi-pie-chart"></i>威胁类型分布</div>
            <div class="chart-container"><canvas id="threatChart"></canvas></div>
        </div>
    </div>
    
    <!-- 底部区域 -->
    <div class="bottom-row">
        <div class="chart-card">
            <div class="chart-title"><i class="bi bi-lightning"></i>最近威胁事件</div>
            <div class="threat-feed" id="threatFeed"></div>
        </div>
        <div class="chart-card">
            <div class="chart-title"><i class="bi bi-bar-chart"></i>检测模块得分</div>
            <div class="chart-container"><canvas id="moduleChart"></canvas></div>
        </div>
    </div>
    
    <footer class="footer">
        <div>
            <span>系统状态: <span style="color: #10b981;">● 正常运行</span></span>
            <span class="mx-3">|</span>
            <span>数据更新: <span id="lastUpdate">刚刚</span></span>
        </div>
        <div>
            <a href="/"><i class="bi bi-house me-1"></i>首页</a>
            <a href="/settings"><i class="bi bi-gear me-1"></i>配置</a>
            <a href="/adversarial"><i class="bi bi-bug me-1"></i>测试</a>
        </div>
    </footer>

    <script>
        // 更新时间
        function updateTime() {
            document.getElementById('currentTime').textContent = new Date().toLocaleString('zh-CN');
        }
        setInterval(updateTime, 1000);
        updateTime();

        // 初始化图表
        function initCharts() {
            // 趋势图
            new Chart(document.getElementById('trendChart').getContext('2d'), {
                type: 'line',
                data: {
                    labels: ['周一', '周二', '周三', '周四', '周五', '周六', '周日'],
                    datasets: [
                        {
                            label: '总检测',
                            data: [45, 52, 38, 65, 48, 72, 58],
                            borderColor: '#3b82f6',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            fill: true,
                            tension: 0.4,
                            pointRadius: 4,
                            pointBackgroundColor: '#3b82f6'
                        },
                        {
                            label: '钓鱼',
                            data: [8, 12, 5, 18, 9, 15, 11],
                            borderColor: '#ef4444',
                            backgroundColor: 'rgba(239, 68, 68, 0.1)',
                            fill: true,
                            tension: 0.4,
                            pointRadius: 4,
                            pointBackgroundColor: '#ef4444'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#94a3b8', usePointStyle: true } } },
                    scales: {
                        x: { ticks: { color: '#64748b' }, grid: { color: 'rgba(255,255,255,0.05)' } },
                        y: { ticks: { color: '#64748b' }, grid: { color: 'rgba(255,255,255,0.05)' } }
                    }
                }
            });

            // 威胁饼图
            new Chart(document.getElementById('threatChart').getContext('2d'), {
                type: 'doughnut',
                data: {
                    labels: ['钓鱼链接', '恶意附件', '域名欺骗', '社会工程'],
                    datasets: [{
                        data: [45, 25, 20, 10],
                        backgroundColor: ['#ef4444', '#f59e0b', '#8b5cf6', '#06b6d4'],
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '65%',
                    plugins: {
                        legend: { position: 'bottom', labels: { color: '#94a3b8', padding: 15, usePointStyle: true } }
                    }
                }
            });

            // 模块得分雷达图
            new Chart(document.getElementById('moduleChart').getContext('2d'), {
                type: 'radar',
                data: {
                    labels: ['邮件头', 'URL', '文本', '附件', 'HTML'],
                    datasets: [{
                        label: '风险得分',
                        data: [0.3, 0.5, 0.4, 0.2, 0.1],
                        backgroundColor: 'rgba(59, 130, 246, 0.2)',
                        borderColor: '#3b82f6',
                        pointBackgroundColor: '#3b82f6',
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: '#3b82f6'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(255,255,255,0.1)' },
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            pointLabels: { color: '#94a3b8' },
                            ticks: { display: false }
                        }
                    }
                }
            });
        }

        // 加载威胁事件
        function loadThreatFeed() {
            const threats = [
                { type: 'danger', icon: 'bi-shield-x', title: '钓鱼邮件拦截', info: 'security@fake-bank.com - 伪造银行', time: '2分钟前' },
                { type: 'danger', icon: 'bi-link-45deg', title: '恶意链接检测', info: 'http://phishing-site.com/verify', time: '15分钟前' },
                { type: 'warning', icon: 'bi-file-earmark', title: '可疑附件', info: 'invoice.pdf.exe - 双重扩展名', time: '1小时前' },
                { type: 'warning', icon: 'bi-envelope', title: '可疑发件人', info: 'admin@secure-bank.net - 非官方', time: '2小时前' },
                { type: 'success', icon: 'bi-arrow-repeat', title: '系统更新', info: 'IOC数据库已同步', time: '3小时前' },
                { type: 'success', icon: 'bi-shield-check', title: '安全扫描', info: '全量邮件扫描完成', time: '6小时前' }
            ];
            
            document.getElementById('threatFeed').innerHTML = threats.map(t => `
                <div class="threat-item">
                    <div class="threat-icon ${t.type}"><i class="bi ${t.icon}"></i></div>
                    <div>
                        <div class="threat-title">${t.title}</div>
                        <div class="threat-info">${t.info}</div>
                    </div>
                    <div class="threat-time">${t.time}</div>
                </div>
            `).join('');
        }

        // 加载统计数据
        async function loadData() {
            try {
                const resp = await fetch('/api/stats/overview');
                const data = await resp.json();
                document.getElementById('totalCount').textContent = data.total || 0;
                document.getElementById('phishingCount').textContent = data.phishing || 0;
                document.getElementById('safeCount').textContent = data.normal || 0;
                document.getElementById('suspiciousCount').textContent = data.suspicious || 0;
                document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('zh-CN');
            } catch (e) { console.error('加载数据失败:', e); }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initCharts();
            loadData();
            loadThreatFeed();
            setInterval(loadData, 30000);
        });
    </script>
</body>
</html>
