<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据大屏 - 钓鱼邮件检测系统</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            padding: 1rem;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            background: rgba(30, 41, 59, 0.8);
            border-radius: 12px;
            margin-bottom: 1rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .header h1 {
            font-size: 1.25rem;
            background: linear-gradient(90deg, #3b82f6, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .live-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #10b981;
            font-size: 0.875rem;
        }
        
        .live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            50% { box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
        }
        
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        .stat-card {
            background: rgba(30, 41, 59, 0.8);
            border-radius: 12px;
            padding: 1.25rem;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
        }
        
        .stat-card.blue::before { background: #3b82f6; }
        .stat-card.red::before { background: #ef4444; }
        .stat-card.green::before { background: #10b981; }
        .stat-card.amber::before { background: #f59e0b; }
        
        .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            margin-bottom: 0.75rem;
        }
        
        .stat-card.blue .stat-icon { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
        .stat-card.red .stat-icon { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .stat-card.green .stat-icon { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .stat-card.amber .stat-icon { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        
        .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
        }
        
        .stat-card.blue .stat-value { color: #3b82f6; }
        .stat-card.red .stat-value { color: #ef4444; }
        .stat-card.green .stat-value { color: #10b981; }
        .stat-card.amber .stat-value { color: #f59e0b; }
        
        .stat-label {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 0.25rem;
        }
        
        .charts-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        .chart-card {
            background: rgba(30, 41, 59, 0.8);
            border-radius: 12px;
            padding: 1.25rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .chart-title {
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .chart-title i { color: #3b82f6; }
        
        .chart-container {
            height: 200px;
            position: relative;
        }
        
        .bottom-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        
        .threat-feed {
            max-height: 250px;
            overflow-y: auto;
        }
        
        .threat-item {
            display: flex;
            gap: 0.75rem;
            padding: 0.75rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .threat-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
            flex-shrink: 0;
        }
        
        .threat-icon.danger { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .threat-icon.warning { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .threat-icon.success { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        
        .threat-title {
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .threat-info {
            font-size: 0.7rem;
            color: #94a3b8;
        }
        
        .threat-time {
            font-size: 0.65rem;
            color: #64748b;
            margin-left: auto;
        }
        
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1.5rem;
            background: rgba(30, 41, 59, 0.8);
            border-radius: 12px;
            margin-top: 1rem;
            font-size: 0.75rem;
            color: #94a3b8;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .footer a {
            color: #94a3b8;
            text-decoration: none;
            margin-left: 1rem;
        }
        
        .footer a:hover { color: #3b82f6; }
        
        .empty-state {
            text-align: center;
            color: #64748b;
            padding: 2rem;
        }
        
        @media (max-width: 1024px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .charts-row { grid-template-columns: 1fr; }
            .bottom-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1><i class="bi bi-shield-check me-2"></i>钓鱼邮件检测系统 - 实时监控大屏</h1>
        <div style="display: flex; align-items: center; gap: 2rem;">
            <div class="live-indicator">
                <span class="live-dot"></span>
                <span>实时监控</span>
            </div>
            <div id="currentTime" style="font-size: 0.875rem;"></div>
        </div>
    </header>
    
    <!-- 统计卡片 -->
    <div class="stats-row">
        <div class="stat-card blue">
            <div class="stat-icon"><i class="bi bi-envelope"></i></div>
            <div class="stat-value" id="totalCount">-</div>
            <div class="stat-label">总检测数</div>
        </div>
        <div class="stat-card red">
            <div class="stat-icon"><i class="bi bi-shield-x"></i></div>
            <div class="stat-value" id="phishingCount">-</div>
            <div class="stat-label">钓鱼邮件</div>
        </div>
        <div class="stat-card green">
            <div class="stat-icon"><i class="bi bi-check-circle"></i></div>
            <div class="stat-value" id="safeCount">-</div>
            <div class="stat-label">安全邮件</div>
        </div>
        <div class="stat-card amber">
            <div class="stat-icon"><i class="bi bi-question-circle"></i></div>
            <div class="stat-value" id="suspiciousCount">-</div>
            <div class="stat-label">可疑邮件</div>
        </div>
    </div>
    
    <!-- 图表区域 -->
    <div class="charts-row">
        <div class="chart-card">
            <div class="chart-title"><i class="bi bi-graph-up"></i>检测趋势</div>
            <div class="chart-container"><canvas id="trendChart"></canvas></div>
        </div>
        <div class="chart-card">
            <div class="chart-title"><i class="bi bi-pie-chart"></i>检测结果分布</div>
            <div class="chart-container"><canvas id="pieChart"></canvas></div>
        </div>
    </div>
    
    <!-- 底部区域 -->
    <div class="bottom-row">
        <div class="chart-card">
            <div class="chart-title"><i class="bi bi-bar-chart"></i>每日检测统计</div>
            <div class="chart-container"><canvas id="barChart"></canvas></div>
        </div>
        <div class="chart-card">
            <div class="chart-title"><i class="bi bi-lightning"></i>最近检测记录</div>
            <div class="threat-feed" id="recentAlerts">
                <div class="empty-state">加载中...</div>
            </div>
        </div>
    </div>
    
    <footer class="footer">
        <div>
            <span>系统状态: <span style="color: #10b981;">● 运行中</span></span>
            <span class="mx-3">|</span>
            <span>数据更新: <span id="lastUpdate">-</span></span>
        </div>
        <div>
            <a href="/">首页</a>
            <a href="/settings">配置</a>
            <a href="/adversarial">测试</a>
        </div>
    </footer>

    <script>
        let trendChart = null;
        let pieChart = null;
        let barChart = null;
        
        // 更新时间
        function updateTime() {
            document.getElementById('currentTime').textContent = new Date().toLocaleString('zh-CN');
        }
        setInterval(updateTime, 1000);
        updateTime();

        // 加载统计数据
        async function loadStats() {
            try {
                const resp = await fetch('/api/stats/overview');
                const data = await resp.json();
                
                document.getElementById('totalCount').textContent = data.total || 0;
                document.getElementById('phishingCount').textContent = data.phishing || 0;
                document.getElementById('safeCount').textContent = data.normal || 0;
                document.getElementById('suspiciousCount').textContent = data.suspicious || 0;
                document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('zh-CN');
                
                // 更新趋势图
                updateTrendChart(data.trend || []);
                
                // 更新饼图
                updatePieChart(data);
                
            } catch (e) {
                console.error('加载统计失败:', e);
            }
        }
        
        // 更新趋势图
        function updateTrendChart(trend) {
            const ctx = document.getElementById('trendChart').getContext('2d');
            
            const labels = trend.map(t => t.day);
            const totals = trend.map(t => t.count);
            const phishing = trend.map(t => t.phish_count || 0);
            
            if (trendChart) {
                trendChart.data.labels = labels;
                trendChart.data.datasets[0].data = totals;
                trendChart.data.datasets[1].data = phishing;
                trendChart.update();
            } else {
                trendChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            {
                                label: '总检测',
                                data: totals,
                                borderColor: '#3b82f6',
                                backgroundColor: 'rgba(59, 130, 246, 0.1)',
                                fill: true,
                                tension: 0.4
                            },
                            {
                                label: '钓鱼',
                                data: phishing,
                                borderColor: '#ef4444',
                                backgroundColor: 'rgba(239, 68, 68, 0.1)',
                                fill: true,
                                tension: 0.4
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { labels: { color: '#94a3b8' } } },
                        scales: {
                            x: { ticks: { color: '#64748b' }, grid: { color: 'rgba(255,255,255,0.05)' } },
                            y: { ticks: { color: '#64748b' }, grid: { color: 'rgba(255,255,255,0.05)' } }
                        }
                    }
                });
            }
        }
        
        // 更新饼图
        function updatePieChart(data) {
            const ctx = document.getElementById('pieChart').getContext('2d');
            
            const values = [data.phishing || 0, data.suspicious || 0, data.normal || 0];
            const hasData = values.some(v => v > 0);
            
            if (pieChart) {
                pieChart.data.datasets[0].data = values;
                pieChart.update();
            } else {
                pieChart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['钓鱼', '可疑', '安全'],
                        datasets: [{
                            data: hasData ? values : [1, 1, 1],
                            backgroundColor: ['#ef4444', '#f59e0b', '#10b981'],
                            borderWidth: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        cutout: '60%',
                        plugins: {
                            legend: { position: 'bottom', labels: { color: '#94a3b8' } }
                        }
                    }
                });
            }
        }
        
        // 加载每日统计
        async function loadDailyStats() {
            try {
                const resp = await fetch('/api/stats/daily?days=7');
                const data = await resp.json();
                
                const ctx = document.getElementById('barChart').getContext('2d');
                
                const labels = data.map(d => d.day.slice(5)); // MM-DD
                const values = data.map(d => d.total);
                
                if (barChart) {
                    barChart.data.labels = labels;
                    barChart.data.datasets[0].data = values;
                    barChart.update();
                } else {
                    barChart = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: '检测数',
                                data: values,
                                backgroundColor: 'rgba(59, 130, 246, 0.6)',
                                borderColor: '#3b82f6',
                                borderWidth: 1
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: {
                                x: { ticks: { color: '#64748b' }, grid: { color: 'rgba(255,255,255,0.05)' } },
                                y: { ticks: { color: '#64748b' }, grid: { color: 'rgba(255,255,255,0.05)' } }
                            }
                        }
                    });
                }
            } catch (e) {
                console.error('加载每日统计失败:', e);
            }
        }
        
        // 加载最近检测
        async function loadRecentAlerts() {
            try {
                const resp = await fetch('/api/alerts?page=1&per_page=5');
                const data = await resp.json();
                
                const container = document.getElementById('recentAlerts');
                
                if (!data.alerts || data.alerts.length === 0) {
                    container.innerHTML = '<div class="empty-state">暂无检测记录</div>';
                    return;
                }
                
                container.innerHTML = data.alerts.map(alert => {
                    let iconClass = 'success';
                    let icon = 'bi-check-circle';
                    
                    if (alert.label === 'PHISHING') {
                        iconClass = 'danger';
                        icon = 'bi-shield-x';
                    } else if (alert.label === 'SUSPICIOUS') {
                        iconClass = 'warning';
                        icon = 'bi-question-circle';
                    }
                    
                    const time = new Date(alert.detection_time).toLocaleString('zh-CN', {
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                    
                    return `
                        <div class="threat-item">
                            <div class="threat-icon ${iconClass}"><i class="bi ${icon}"></i></div>
                            <div>
                                <div class="threat-title">${alert.subject || '无主题'}</div>
                                <div class="threat-info">${alert.from_email || '未知发件人'}</div>
                            </div>
                            <div class="threat-time">${time}</div>
                        </div>
                    `;
                }).join('');
                
            } catch (e) {
                console.error('加载最近检测失败:', e);
                document.getElementById('recentAlerts').innerHTML = '<div class="empty-state">加载失败</div>';
            }
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadStats();
            loadDailyStats();
            loadRecentAlerts();
            
            // 每30秒刷新
            setInterval(() => {
                loadStats();
                loadRecentAlerts();
            }, 30000);
        });
    </script>
</body>
</html>
