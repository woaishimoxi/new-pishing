<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>对抗样本测试 - 钓鱼邮件检测系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --border: #e2e8f0;
            --text: #1e293b;
            --text2: #64748b;
            --blue: #3b82f6;
            --red: #ef4444;
            --green: #10b981;
            --amber: #f59e0b;
        }
        body { background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
        .nav { background: var(--card); border-bottom: 1px solid var(--border); padding: 0.75rem 1.5rem; display: flex; justify-content: space-between; align-items: center; }
        .nav-brand { font-weight: 600; color: var(--text); text-decoration: none; }
        .nav-brand i { color: var(--blue); }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 1rem; }
        .card-header { padding: 1rem; border-bottom: 1px solid var(--border); font-weight: 600; }
        .card-body { padding: 1rem; }
        .btn { padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.875rem; cursor: pointer; border: none; }
        .btn-primary { background: var(--blue); color: white; }
        .btn-secondary { background: var(--border); color: var(--text); }
        .btn-danger { background: var(--red); color: white; }
        .btn-success { background: var(--green); color: white; }
        .form-control { border: 1px solid var(--border); border-radius: 6px; padding: 0.5rem; font-size: 0.875rem; }
        .attack-btn { padding: 0.375rem 0.75rem; border: 1px solid var(--border); background: var(--card); border-radius: 20px; font-size: 0.75rem; cursor: pointer; margin: 0.25rem; }
        .attack-btn.active { background: var(--blue); color: white; border-color: var(--blue); }
        .result-safe { background: rgba(16, 185, 129, 0.1); border: 2px solid var(--green); }
        .result-phishing { background: rgba(239, 68, 68, 0.1); border: 2px solid var(--red); }
        .result-suspicious { background: rgba(245, 158, 11, 0.1); border: 2px solid var(--amber); }
        .diff-old { background: rgba(239, 68, 68, 0.2); text-decoration: line-through; }
        .diff-new { background: rgba(16, 185, 129, 0.2); }
        .log-item { padding: 0.5rem; border-bottom: 1px solid var(--border); font-size: 0.8rem; }
        .log-time { color: var(--text2); }
    </style>
</head>
<body>
    <nav class="nav">
        <a class="nav-brand" href="/"><i class="bi bi-shield-check me-1"></i>钓鱼邮件检测系统</a>
        <div style="display: flex; gap: 0.5rem;">
            <a href="/" class="btn btn-secondary">首页</a>
            <a href="/bigscreen" class="btn btn-secondary">数据大屏</a>
        </div>
    </nav>
    
    <div class="container">
        <h5 style="margin-bottom: 0.5rem;"><i class="bi bi-bug me-2" style="color: var(--red);"></i>对抗样本测试</h5>
        <p style="color: var(--text2); margin-bottom: 1.5rem;">测试系统对恶意变形邮件的检测鲁棒性</p>
        
        <div class="row">
            <!-- 左侧：输入 -->
            <div class="col-lg-6">
                <div class="card">
                    <div class="card-header"><i class="bi bi-pencil me-2"></i>构造对抗样本</div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label style="font-size: 0.8rem; font-weight: 600;">原始邮件内容</label>
                            <textarea class="form-control" id="originalEmail" rows="5" style="width: 100%;">尊敬的用户，您的账户存在异常，请立即登录 http://bank-verify.com 验证身份，否则账户将在24小时内冻结。</textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label style="font-size: 0.8rem; font-weight: 600;">变形攻击方式</label>
                            <div>
                                <button class="attack-btn active" data-type="homophone">同音字替换</button>
                                <button class="attack-btn" data-type="invisible">零宽字符</button>
                                <button class="attack-btn" data-type="unicode">Unicode混淆</button>
                                <button class="attack-btn" data-type="spaces">空格插入</button>
                                <button class="attack-btn" data-type="random">随机组合</button>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label style="font-size: 0.8rem; font-weight: 600;">攻击强度: <span id="intensityVal">30</span>%</label>
                            <input type="range" class="form-range" id="intensity" min="10" max="80" value="30" style="width: 100%;">
                        </div>
                        
                        <div style="display: flex; gap: 0.5rem;">
                            <button class="btn btn-primary" onclick="generateAttack()" style="flex: 1;"><i class="bi bi-lightning me-1"></i>生成对抗样本</button>
                            <button class="btn btn-secondary" onclick="testBoth()"><i class="bi bi-arrow-left-right me-1"></i>对比测试</button>
                        </div>
                    </div>
                </div>
                
                <div class="card" id="attackCard" style="display: none;">
                    <div class="card-header"><i class="bi bi-file-diff me-2"></i>对抗样本</div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label style="font-size: 0.8rem; font-weight: 600;">变形后邮件</label>
                            <textarea class="form-control" id="attackedEmail" rows="5" style="width: 100%;" readonly></textarea>
                        </div>
                        <div class="mb-3">
                            <label style="font-size: 0.8rem; font-weight: 600;">变形详情</label>
                            <div id="attackDetails" class="p-2" style="background: #f8fafc; border-radius: 6px; font-family: monospace; font-size: 0.8rem;"></div>
                        </div>
                        <button class="btn btn-danger" onclick="testAttacked()" style="width: 100%;"><i class="bi bi-play-circle me-1"></i>检测对抗样本</button>
                    </div>
                </div>
            </div>
            
            <!-- 右侧：结果 -->
            <div class="col-lg-6">
                <div class="card">
                    <div class="card-header"><i class="bi bi-clipboard-data me-2"></i>检测结果对比</div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-6">
                                <div class="p-3 rounded" id="originalResult" style="background: #f8fafc; border: 2px solid var(--border); text-align: center;">
                                    <div style="font-size: 0.8rem; color: var(--text2); margin-bottom: 0.5rem;">原始邮件</div>
                                    <div style="font-size: 1.5rem;">⏳</div>
                                    <div style="font-size: 0.9rem; font-weight: 600;">未检测</div>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="p-3 rounded" id="attackedResult" style="background: #f8fafc; border: 2px solid var(--border); text-align: center;">
                                    <div style="font-size: 0.8rem; color: var(--text2); margin-bottom: 0.5rem;">对抗样本</div>
                                    <div style="font-size: 1.5rem;">⏳</div>
                                    <div style="font-size: 0.9rem; font-weight: 600;">未检测</div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="mt-3 p-3 rounded" id="robustnessBox" style="background: #f8fafc; display: none;">
                            <div style="font-size: 0.8rem; font-weight: 600; margin-bottom: 0.5rem;"><i class="bi bi-shield-check me-1"></i>鲁棒性评估</div>
                            <div id="robustnessContent"></div>
                        </div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <span><i class="bi bi-clock-history me-2"></i>测试日志</span>
                        <button class="btn btn-secondary" style="padding: 0.25rem 0.5rem; font-size: 0.75rem;" onclick="clearLog()">清空</button>
                    </div>
                    <div class="card-body" style="max-height: 300px; overflow-y: auto;" id="logBox">
                        <div style="text-align: center; color: var(--text2); padding: 2rem;">
                            <i class="bi bi-inbox" style="font-size: 2rem;"></i>
                            <p style="margin-top: 0.5rem; font-size: 0.8rem;">暂无测试记录</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let attackType = 'homophone';
        let results = { original: null, attacked: null };
        
        // 攻击类型选择
        document.querySelectorAll('.attack-btn').forEach(btn => {
            btn.onclick = function() {
                document.querySelectorAll('.attack-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                attackType = this.dataset.type;
            };
        });
        
        // 强度滑块
        document.getElementById('intensity').oninput = function() {
            document.getElementById('intensityVal').textContent = this.value;
        };
        
        // 同音字字典
        const homophones = {
            '是': ['时','事','市','势'], '在': ['再','载'], '的': ['得','地'],
            '您': ['你'], '请': ['清','情'], '立': ['利','力'], '即': ['几','机'],
            '登': ['灯','等'], '录': ['路','陆'], '验': ['演','眼'], '证': ['正','政'],
            '密': ['秘'], '码': ['马'], '账': ['张'], '户': ['护','互'],
            '冻': ['动','东'], '结': ['节'], '银': ['引','因'],
            'bank': ['b4nk','bаnk'], 'login': ['l0gin'], 'verify': ['vеrify'],
            'secure': ['sеcure'], 'password': ['pаssword']
        };
        
        const zeroWidth = ['\u200B','\u200C','\u200D','\uFEFF'];
        
        const unicodeMap = {
            'a': 'аɑα', 'e': 'еёε', 'o': 'оο0', 'p': 'рρ', 'c': 'сϲ',
            'i': 'іι1', 'l': 'ⅼ1', 's': 'ѕ', 'x': 'х'
        };
        
        // 生成攻击
        function generateAttack() {
            const original = document.getElementById('originalEmail').value;
            const intensity = parseInt(document.getElementById('intensity').value) / 100;
            let changes = [];
            let attacked = '';
            
            switch(attackType) {
                case 'homophone':
                    attacked = applyHomophone(original, intensity, changes);
                    break;
                case 'invisible':
                    attacked = applyInvisible(original, intensity, changes);
                    break;
                case 'unicode':
                    attacked = applyUnicode(original, intensity, changes);
                    break;
                case 'spaces':
                    attacked = applySpaces(original, intensity, changes);
                    break;
                case 'random':
                    attacked = applyRandom(original, intensity, changes);
                    break;
            }
            
            document.getElementById('attackedEmail').value = attacked;
            document.getElementById('attackCard').style.display = 'block';
            
            // 显示变化
            let detailHtml = changes.length > 0 
                ? changes.map(c => `<div><span class="diff-old">${c.from}</span> → <span class="diff-new">${c.to}</span></div>`).join('')
                : '<div style="color: var(--text2);">未进行变形</div>';
            document.getElementById('attackDetails').innerHTML = `<strong>共 ${changes.length} 处变形:</strong><br>${detailHtml}`;
            
            addLog('生成对抗样本', `${attackType} - 强度${intensity*100}%`);
        }
        
        function applyHomophone(text, intensity, changes) {
            let result = text;
            for (let [char, replacements] of Object.entries(homophones)) {
                if (result.includes(char) && Math.random() < intensity) {
                    const rep = replacements[Math.floor(Math.random() * replacements.length)];
                    result = result.replace(new RegExp(char, 'g'), rep);
                    changes.push({ from: char, to: rep });
                }
            }
            return result;
        }
        
        function applyInvisible(text, intensity, changes) {
            let result = '';
            let count = 0;
            for (let i = 0; i < text.length; i++) {
                result += text[i];
                if (Math.random() < intensity * 0.3) {
                    result += zeroWidth[Math.floor(Math.random() * zeroWidth.length)];
                    count++;
                }
            }
            if (count > 0) changes.push({ from: '文本', to: `插入${count}个零宽字符` });
            return result;
        }
        
        function applyUnicode(text, intensity, changes) {
            let result = text;
            for (let [char, similar] of Object.entries(unicodeMap)) {
                if (result.includes(char) && Math.random() < intensity) {
                    const rep = similar[Math.floor(Math.random() * similar.length)];
                    result = result.replace(new RegExp(char, 'g'), rep);
                    changes.push({ from: char, to: `${char}(Unicode)` });
                }
            }
            return result;
        }
        
        function applySpaces(text, intensity, changes) {
            let result = '';
            let count = 0;
            const words = text.split(/(\s+)/);
            for (let word of words) {
                if (word.trim() && Math.random() < intensity) {
                    result += word.split('').join(' ');
                    count++;
                } else {
                    result += word;
                }
            }
            if (count > 0) changes.push({ from: '正常单词', to: `${count}个单词插入空格` });
            return result;
        }
        
        function applyRandom(text, intensity, changes) {
            let result = text;
            const attacks = ['homophone', 'invisible', 'unicode'];
            const num = Math.ceil(intensity * 2);
            for (let i = 0; i < num; i++) {
                const attack = attacks[Math.floor(Math.random() * attacks.length)];
                const subChanges = [];
                switch(attack) {
                    case 'homophone': result = applyHomophone(result, 0.3, subChanges); break;
                    case 'invisible': result = applyInvisible(result, 0.2, subChanges); break;
                    case 'unicode': result = applyUnicode(result, 0.2, subChanges); break;
                }
                changes.push(...subChanges);
            }
            return result;
        }
        
        // 检测邮件
        async function detect(email, label) {
            try {
                const resp = await fetch('/api/detection/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, source: '对抗测试' })
                });
                const data = await resp.json();
                return { label: data.label, confidence: data.confidence, reason: data.reason };
            } catch (e) {
                return { label: 'ERROR', confidence: 0, reason: e.message };
            }
        }
        
        // 更新结果卡片
        function updateCard(id, result, label) {
            const el = document.getElementById(id);
            let cls = 'result-safe', icon = '✅', text = '安全';
            if (result.label === 'PHISHING') { cls = 'result-phishing'; icon = '🚨'; text = '钓鱼'; }
            else if (result.label === 'SUSPICIOUS') { cls = 'result-suspicious'; icon = '⚠️'; text = '可疑'; }
            
            el.className = `p-3 rounded ${cls}`;
            el.innerHTML = `
                <div style="font-size: 0.8rem; color: var(--text2); margin-bottom: 0.5rem;">${label}</div>
                <div style="font-size: 2rem;">${icon}</div>
                <div style="font-size: 1rem; font-weight: 600;">${text}</div>
                <div style="font-size: 0.8rem; color: var(--text2);">置信度: ${(result.confidence * 100).toFixed(1)}%</div>
            `;
            addLog(`检测${label}`, `${result.label} (${(result.confidence*100).toFixed(1)}%)`);
        }
        
        // 评估鲁棒性
        function evalRobustness() {
            const box = document.getElementById('robustnessBox');
            const content = document.getElementById('robustnessContent');
            
            if (!results.original || !results.attacked) {
                box.style.display = 'none';
                return;
            }
            
            box.style.display = 'block';
            const orig = results.original.label;
            const att = results.attacked.label;
            
            if (orig === att) {
                content.innerHTML = `
                    <div style="color: var(--green); font-weight: 600;">✅ 鲁棒性良好</div>
                    <div style="font-size: 0.8rem; margin-top: 0.5rem;">
                        系统成功识别了经过变形攻击的邮件。<br>
                        原始: ${orig} | 对抗: ${att}
                    </div>
                `;
            } else if (orig === 'PHISHING' && att !== 'PHISHING') {
                content.innerHTML = `
                    <div style="color: var(--amber); font-weight: 600;">⚠️ 检测到逃逸攻击</div>
                    <div style="font-size: 0.8rem; margin-top: 0.5rem;">
                        对抗样本绕过了检测，建议：<br>
                        - 增加变形字符检测规则<br>
                        - 在训练数据中加入对抗样本
                    </div>
                `;
            } else {
                content.innerHTML = `
                    <div style="color: var(--blue); font-weight: 600;">📊 结果有差异</div>
                    <div style="font-size: 0.8rem; margin-top: 0.5rem;">
                        原始: ${orig} (${(results.original.confidence*100).toFixed(1)}%)<br>
                        对抗: ${att} (${(results.attacked.confidence*100).toFixed(1)}%)
                    </div>
                `;
            }
        }
        
        // 测试原始
        async function testOriginal() {
            const email = document.getElementById('originalEmail').value;
            results.original = await detect(email, '原始');
            updateCard('originalResult', results.original, '原始邮件');
            evalRobustness();
        }
        
        // 测试对抗
        async function testAttacked() {
            const email = document.getElementById('attackedEmail').value;
            results.attacked = await detect(email, '对抗');
            updateCard('attackedResult', results.attacked, '对抗样本');
            evalRobustness();
        }
        
        // 对比测试
        async function testBoth() {
            generateAttack();
            await testOriginal();
            await testAttacked();
        }
        
        // 日志
        function addLog(action, detail) {
            const box = document.getElementById('logBox');
            const empty = box.querySelector('.text-center');
            if (empty) empty.remove();
            
            const item = document.createElement('div');
            item.className = 'log-item';
            item.innerHTML = `<span class="log-time">${new Date().toLocaleTimeString()}</span> <strong>${action}</strong>: ${detail}`;
            box.insertBefore(item, box.firstChild);
        }
        
        function clearLog() {
            document.getElementById('logBox').innerHTML = `
                <div style="text-align: center; color: var(--text2); padding: 2rem;">
                    <i class="bi bi-inbox" style="font-size: 2rem;"></i>
                    <p style="margin-top: 0.5rem; font-size: 0.8rem;">暂无测试记录</p>
                </div>
            `;
        }
    </script>
</body>
</html>
