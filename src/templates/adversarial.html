<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>对抗样本测试 - 钓鱼邮件检测系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.bootcdn.net/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <style>
        :root {
            --bg-primary: #f5f5f7;
            --bg-secondary: #e8e8ed;
            --bg-card: #ffffff;
            --bg-input: #f5f5f7;
            --border-color: rgba(0, 0, 0, 0.08);
            --border-hover: rgba(0, 113, 227, 0.3);
            --text-primary: #1d1d1f;
            --text-secondary: #6e6e73;
            --text-muted: #86868b;
            --blue: #0071e3;
            --blue-light: #00c7be;
            --green: #34c759;
            --red: #ff3b30;
            --amber: #ff9500;
            --purple: #af52de;
            --gradient-primary: linear-gradient(135deg, #0071e3 0%, #00c7be 100%);
            --gradient-success: linear-gradient(135deg, #34c759 0%, #30d158 100%);
            --gradient-danger: linear-gradient(135deg, #ff3b30 0%, #ff9500 100%);
            --gradient-purple: linear-gradient(135deg, #af52de 0%, #bf5af2 100%);
            --shadow-card: 0 2px 12px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 8px 30px rgba(0, 0, 0, 0.12);
            --radius-sm: 10px;
            --radius-md: 14px;
            --radius-lg: 18px;
        }

        * { box-sizing: border-box; }

        body { 
            background: linear-gradient(180deg, #f5f5f7 0%, #ffffff 100%);
            background-attachment: fixed;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            color: var(--text-primary);
            font-weight: 400;
            letter-spacing: -0.01em;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .nav { 
            background: rgba(255, 255, 255, 0.72); 
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 0.5px solid rgba(0, 0, 0, 0.1); 
            padding: 0.75rem 1.5rem; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            box-shadow: 0 1px 0 rgba(0, 0, 0, 0.05);
        }

        .nav-brand { 
            font-family: 'Orbitron', sans-serif;
            font-weight: 600; 
            color: var(--text-primary); 
            text-decoration: none;
            letter-spacing: 1px;
        }

        .nav-brand:hover { 
            color: var(--blue);
        }

        .nav-brand i { 
            color: var(--blue);
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }

        .page-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            letter-spacing: 2px;
        }

        .page-title i {
            color: var(--red);
        }

        .page-desc {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .card { 
            background: var(--bg-card); 
            border: 1px solid var(--border-color); 
            border-radius: var(--radius-lg); 
            margin-bottom: 1rem; 
            box-shadow: var(--shadow-card);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-primary);
        }

        .card:hover {
            border-color: var(--border-hover);
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .card-header { 
            padding: 1.125rem 1.25rem; 
            border-bottom: 1px solid var(--border-color); 
            font-weight: 600; 
            display: flex; 
            align-items: center; 
            gap: 0.5rem;
            background: rgba(59, 130, 246, 0.03);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0 !important;
        }

        .card-header i { color: var(--blue); }
        .card-body { padding: 1.25rem; }

        .attack-type-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border: 1px solid var(--border-color);
            background: white;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s;
            margin: 0.25rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .attack-type-btn:hover { 
            border-color: var(--blue); 
            background: rgba(37, 99, 235, 0.05); 
            color: var(--blue);
        }

        .attack-type-btn.active { 
            background: var(--gradient-primary); 
            color: white; 
            border-color: transparent;
            font-weight: 600;
        }

        .attack-type-btn .icon { font-size: 1.1rem; }

        .difficulty-badge {
            padding: 0.125rem 0.5rem;
            border-radius: 4px;
            font-size: 0.65rem;
            font-weight: 600;
        }

        .difficulty-easy { background: rgba(16, 185, 129, 0.15); color: var(--green); }
        .difficulty-medium { background: rgba(245, 158, 11, 0.15); color: var(--amber); }
        .difficulty-hard { background: rgba(239, 68, 68, 0.15); color: var(--red); }

        .result-card {
            border-radius: var(--radius-md);
            padding: 1rem;
            text-align: center;
            transition: all 0.3s;
            border: 2px solid;
        }

        .result-safe { 
            background: rgba(16, 185, 129, 0.1); 
            border-color: var(--green);
        }

        .result-phishing { 
            background: rgba(239, 68, 68, 0.1); 
            border-color: var(--red);
        }

        .result-suspicious { 
            background: rgba(245, 158, 11, 0.1); 
            border-color: var(--amber);
        }

        .result-unknown { 
            background: rgba(148, 163, 184, 0.1); 
            border-color: var(--text-muted);
        }

        .diff-view {
            font-family: 'Consolas', 'Monaco', 'Fira Code', monospace;
            font-size: 0.8rem;
            background: #1e293b;
            color: #93c5fd;
            padding: 1rem;
            border-radius: var(--radius-md);
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            border: 1px solid var(--border-color);
        }

        .diff-char-normal { color: #94a3b8; }
        .diff-char-attacked { background: rgba(239, 68, 68, 0.3); color: #fca5a5; }

        .robustness-meter {
            height: 12px;
            background: rgba(148, 163, 184, 0.2);
            border-radius: 6px;
            overflow: hidden;
            margin: 0.5rem 0;
        }

        .robustness-fill {
            height: 100%;
            border-radius: 6px;
            transition: width 0.5s ease;
        }

        .log-container {
            max-height: 300px;
            overflow-y: auto;
            font-size: 0.8rem;
        }

        .log-item {
            padding: 0.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 0.5rem;
        }

        .log-time { color: var(--text-muted); min-width: 60px; }

        .preset-btn {
            padding: 0.375rem 0.75rem;
            border: 1px solid var(--border-color);
            background: white;
            border-radius: 6px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
        }

        .preset-btn:hover { 
            border-color: var(--blue); 
            color: var(--blue);
            background: rgba(37, 99, 235, 0.05);
        }

        .stat-mini {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem 0.5rem;
            background: rgba(148, 163, 184, 0.1);
            border-radius: 4px;
            font-size: 0.75rem;
            border: 1px solid var(--border-color);
        }

        .form-control {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 0.85rem;
        }

        .form-control:focus {
            background: #ffffff;
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
            color: var(--text-primary);
        }

        .form-control::placeholder {
            color: var(--text-muted);
        }

        .form-range::-webkit-slider-thumb {
            background: var(--blue);
        }

        .form-range::-webkit-slider-runnable-track {
            background: rgba(148, 163, 184, 0.3);
        }

        .btn-primary {
            background: var(--gradient-primary);
            border: none;
            color: white;
            font-weight: 600;
            box-shadow: 0 2px 10px rgba(37, 99, 235, 0.3);
        }

        .btn-primary:hover {
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
            transform: translateY(-2px);
            color: white;
        }

        .btn-success {
            background: var(--gradient-success);
            border: none;
            color: white;
            font-weight: 600;
            box-shadow: 0 2px 10px rgba(16, 185, 129, 0.3);
        }

        .btn-success:hover {
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
            transform: translateY(-2px);
            color: white;
        }

        .btn-danger {
            background: var(--gradient-danger);
            border: none;
            color: white;
            box-shadow: 0 2px 10px rgba(239, 68, 68, 0.3);
        }

        .btn-danger:hover {
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
            transform: translateY(-2px);
            color: white;
        }

        .form-label {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gradient-primary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--blue);
        }
    </style>
</head>
<body>
    <nav class="nav">
        <a class="nav-brand" href="/"><i class="bi bi-shield-check me-2"></i>PHISHING DETECTOR</a>
        <div style="display: flex; gap: 0.5rem;">
            <a href="/bigscreen" class="preset-btn">数据大屏</a>
            <a href="/" class="preset-btn">首页</a>
        </div>
    </nav>
    
    <div class="container">
        <div class="mb-3">
            <h5 class="page-title"><i class="bi bi-bug me-2"></i>对抗样本测试</h5>
            <p class="page-desc">测试系统对恶意变形邮件的检测鲁棒性，验证模型抗攻击能力</p>
        </div>
        
        <div class="row">
            <div class="col-lg-5">
                <div class="card">
                    <div class="card-header"><i class="bi bi-envelope"></i>原始邮件内容</div>
                    <div class="card-body">
                        <div class="mb-2">
                            <button class="preset-btn" onclick="loadPreset('phishing')">加载钓鱼样本</button>
                            <button class="preset-btn" onclick="loadPreset('legitimate')">加载正常样本</button>
                            <button class="preset-btn" onclick="clearInput()">清空</button>
                        </div>
                        <textarea class="form-control" id="originalEmail" rows="5" style="font-size: 0.85rem;" placeholder="输入要测试的邮件内容...">尊敬的用户，您的银行账户存在异常登录，请立即点击 http://secure-bank-verify.com 登录验证，否则账户将在24小时内被冻结。请勿将此信息告知他人。</textarea>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header"><i class="bi bi-lightning"></i>攻击方式</div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">文本变形攻击</label>
                            <div>
                                <button class="attack-type-btn active" data-type="homoglyph" onclick="selectAttackType(this)">
                                    <span class="icon">🔄</span>同形字替换
                                    <span class="difficulty-badge difficulty-easy">简单</span>
                                </button>
                                <button class="attack-type-btn" data-type="zerowidth" onclick="selectAttackType(this)">
                                    <span class="icon">👻</span>零宽字符
                                    <span class="difficulty-badge difficulty-medium">中等</span>
                                </button>
                                <button class="attack-type-btn" data-type="unicode" onclick="selectAttackType(this)">
                                    <span class="icon">🔤</span>Unicode混淆
                                    <span class="difficulty-badge difficulty-hard">困难</span>
                                </button>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">结构变形攻击</label>
                            <div>
                                <button class="attack-type-btn" data-type="synonym" onclick="selectAttackType(this)">
                                    <span class="icon">📝</span>同义词替换
                                    <span class="difficulty-badge difficulty-medium">中等</span>
                                </button>
                                <button class="attack-type-btn" data-type="spaces" onclick="selectAttackType(this)">
                                    <span class="icon">📏</span>空格插入
                                    <span class="difficulty-badge difficulty-easy">简单</span>
                                </button>
                                <button class="attack-type-btn" data-type="encoding" onclick="selectAttackType(this)">
                                    <span class="icon">🔀</span>编码绕过
                                    <span class="difficulty-badge difficulty-hard">困难</span>
                                </button>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">高级攻击</label>
                            <div>
                                <button class="attack-type-btn" data-type="url_encode" onclick="selectAttackType(this)">
                                    <span class="icon">🔗</span>URL编码
                                    <span class="difficulty-badge difficulty-medium">中等</span>
                                </button>
                                <button class="attack-type-btn" data-type="html_entities" onclick="selectAttackType(this)">
                                    <span class="icon">🏷️</span>HTML实体
                                    <span class="difficulty-badge difficulty-medium">中等</span>
                                </button>
                                <button class="attack-type-btn" data-type="random" onclick="selectAttackType(this)">
                                    <span class="icon">🎲</span>随机组合
                                    <span class="difficulty-badge difficulty-hard">困难</span>
                                </button>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">
                                攻击强度: <span id="intensityValue" style="color: var(--blue);">30</span>%
                            </label>
                            <input type="range" class="form-range" id="attackIntensity" min="10" max="100" value="30" style="width: 100%;">
                            <div style="display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--text-muted);">
                                <span>轻微变形</span>
                                <span>重度变形</span>
                            </div>
                        </div>
                        
                        <div style="display: flex; gap: 0.5rem;">
                            <button class="btn btn-primary" style="flex: 1;" onclick="generateAttack()">
                                <i class="bi bi-lightning-charge me-1"></i>生成对抗样本
                            </button>
                            <button class="btn btn-success" onclick="batchTest()">
                                <i class="bi bi-play-circle me-1"></i>批量测试
                            </button>
                        </div>
                    </div>
                </div>
                
                <div class="card" id="attackedCard" style="display: none;">
                    <div class="card-header"><i class="bi bi-file-diff"></i>对抗样本预览</div>
                    <div class="card-body">
                        <div class="mb-2">
                            <span style="font-size: 0.8rem; color: var(--text-secondary);">变形后内容:</span>
                        </div>
                        <div class="diff-view" id="attackedPreview"></div>
                        
                        <div class="mt-3 mb-2">
                            <span style="font-size: 0.8rem; color: var(--text-secondary);">变形详情:</span>
                        </div>
                        <div id="attackDetails" style="font-size: 0.8rem;"></div>
                        
                        <button class="btn btn-danger w-100 mt-3" onclick="testAttacked()">
                            <i class="bi bi-shield-check me-1"></i>检测对抗样本
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="col-lg-7">
                <div class="card">
                    <div class="card-header"><i class="bi bi-clipboard-data"></i>检测结果对比</div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="result-card result-unknown" id="originalResult">
                                    <div style="font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.5rem;">原始邮件</div>
                                    <div style="font-size: 2rem;">-</div>
                                    <div style="font-size: 1rem; font-weight: 600;">未检测</div>
                                    <div style="font-size: 0.75rem; color: var(--text-muted);">置信度: -</div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="result-card result-unknown" id="attackedResult">
                                    <div style="font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.5rem;">对抗样本</div>
                                    <div style="font-size: 2rem;">-</div>
                                    <div style="font-size: 1rem; font-weight: 600;">未检测</div>
                                    <div style="font-size: 0.75rem; color: var(--text-muted);">置信度: -</div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="mt-3 p-3 rounded" id="robustnessSection" style="background: rgba(37, 99, 235, 0.05); border: 1px solid var(--border-color); display: none;">
                            <div style="font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem;">
                                <i class="bi bi-shield-check me-1" style="color: var(--blue);"></i>鲁棒性评估
                            </div>
                            <div class="robustness-meter">
                                <div class="robustness-fill" id="robustnessBar" style="width: 0%; background: var(--green);"></div>
                            </div>
                            <div style="display: flex; justify-content: space-between; font-size: 0.75rem;">
                                <span id="robustnessLabel">-</span>
                                <span id="robustnessScore">-</span>
                            </div>
                            <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.5rem;" id="robustnessAnalysis"></p>
                        </div>
                    </div>
                </div>
                
                <div class="card" id="batchResultCard" style="display: none;">
                    <div class="card-header"><i class="bi bi-bar-chart"></i>批量测试结果</div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <div style="height: 200px;">
                                    <canvas id="robustnessChart"></canvas>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div id="batchStats"></div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <span><i class="bi bi-clock-history"></i>测试日志</span>
                        <button class="preset-btn" onclick="clearLog()">清空</button>
                    </div>
                    <div class="card-body">
                        <div class="log-container" id="logContainer">
                            <div style="text-align: center; color: var(--text-muted); padding: 2rem;">
                                <i class="bi bi-inbox" style="font-size: 1.5rem;"></i>
                                <p style="margin-top: 0.5rem; font-size: 0.8rem;">暂无测试记录</p>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header"><i class="bi bi-info-circle"></i>攻击技术说明</div>
                    <div class="card-body">
                        <div id="attackDescription">
                            <p style="font-size: 0.85rem;"><strong>同形字替换:</strong> 使用视觉相似的Unicode字符替换原文字符，如用拉丁字母a替换西里尔字母а。</p>
                            <p style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.5rem;">选择其他攻击类型查看详细说明...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentAttackType = 'homoglyph';
        let testResults = { original: null, attacked: null };
        let batchResults = [];
        
        const attackDescriptions = {
            homoglyph: '<p style="font-size: 0.85rem;"><strong>同形字替换:</strong> 使用视觉相似的Unicode字符替换原文字符，如用拉丁字母a替换西里尔字母а，用数字0替换字母O。这是最经典的对抗攻击方式。</p>',
            zerowidth: '<p style="font-size: 0.85rem;"><strong>零宽字符插入:</strong> 在文本中插入不可见的Unicode字符（如零宽空格、零宽连接符），这些字符不会显示但会改变文本内容。</p>',
            unicode: '<p style="font-size: 0.85rem;"><strong>Unicode混淆:</strong> 使用Unicode同义字符替换普通字符，如使用全角字符、数学符号等替代标准字符。</p>',
            synonym: '<p style="font-size: 0.85rem;"><strong>同义词替换:</strong> 将敏感词汇替换为同义词或近义词，如将"密码"替换为"口令"，将"紧急"替换为"急需"。</p>',
            spaces: '<p style="font-size: 0.85rem;"><strong>空格插入:</strong> 在关键词中插入空格或其他字符，如将"password"写为"p a s s w o r d"或"pass-word"。</p>',
            encoding: '<p style="font-size: 0.85rem;"><strong>编码绕过:</strong> 使用URL编码、Base64编码等方式混淆敏感内容，使关键词检测失效。</p>',
            url_encode: '<p style="font-size: 0.85rem;"><strong>URL编码:</strong> 将URL中的字符进行URL编码，如将"http"编码为"http%3A%2F%2F"。</p>',
            html_entities: '<p style="font-size: 0.85rem;"><strong>HTML实体:</strong> 使用HTML实体编码表示字符，如将"<"编码为"&lt;"，将空格编码为"&nbsp;"。</p>',
            random: '<p style="font-size: 0.85rem;"><strong>随机组合:</strong> 随机选择多种攻击方式进行组合，模拟真实攻击者的复杂攻击策略。</p>'
        };
        
        const homoglyphMap = {
            'a': ['а', 'ɑ', 'α', 'ａ'],
            'e': ['е', 'ё', 'ε', 'ｅ'],
            'o': ['о', 'ο', '0', 'ｏ'],
            'p': ['р', 'ρ', 'ｐ'],
            'c': ['с', 'ϲ', 'ｃ'],
            'x': ['х', '×', 'ｘ'],
            'i': ['і', 'ι', '1', 'ｉ'],
            'l': ['ⅼ', '1', 'ｌ'],
            's': ['ѕ', 'ｓ'],
            'n': ['п'],
            'B': ['В', 'Ｂ'],
            'E': ['Е', 'Ｅ'],
            'H': ['Н', 'Ｈ'],
            'A': ['А', 'Ａ'],
            'C': ['С', 'Ｃ'],
            'O': ['О', '０'],
            'P': ['Р', 'Ｐ'],
            'X': ['Х', 'Ｘ'],
            '是': ['時', '事'],
            '在': ['再', '载'],
            '的': ['得', '地'],
            '您': ['你'],
            '请': ['清', '情'],
            '银': ['引', '因'],
            '行': ['航', '恒'],
            '密': ['秘'],
            '码': ['马'],
            '立': ['利', '力'],
            '即': ['几', '机']
        };
        
        const zeroWidthChars = ['\u200B', '\u200C', '\u200D', '\uFEFF', '\u2060', '\u180E'];
        
        const unicodeSynonyms = {
            'a': ['а', 'ɑ', 'α', 'а', 'ạ', 'à', 'á', 'â', 'ã', 'ä'],
            'e': ['е', 'ё', 'ε', 'е', 'ẹ', 'è', 'é', 'ê', 'ë'],
            'o': ['о', 'ο', 'о', 'ọ', 'ò', 'ó', 'ô', 'õ', 'ö'],
            'u': ['υ', 'ц', 'μ', 'ụ', 'ù', 'ú', 'û', 'ü'],
            'i': ['і', 'ι', 'ı', 'ị', 'ì', 'í', 'î', 'ï'],
            'n': ['η', 'п', 'ṇ', 'ñ', 'ń'],
            's': ['ѕ', 'ş', 'ś', 'š'],
            'c': ['с', 'ϲ', 'ç', 'ć', 'č']
        };
        
        const synonymMap = {
            '密码': ['口令', '密钥', '通行证'],
            '账户': ['账号', '户头'],
            '银行': ['金融机构', '资金方'],
            '立即': ['马上', '迅速', '火速'],
            '紧急': ['紧迫', '急需', '迫切'],
            '验证': ['确认', '核实', '校验'],
            '登录': ['进入', '访问', '登陆'],
            '冻结': ['锁定', '限制', '暂停'],
            '异常': ['可疑', '不正常', '有问题'],
            'password': ['passcode', 'secret', 'key'],
            'account': ['profile', 'user', 'login'],
            'bank': ['financial', 'credit', 'money'],
            'urgent': ['important', 'critical', 'immediate'],
            'verify': ['confirm', 'check', 'validate'],
            'login': ['access', 'enter', 'sign-in'],
            'suspended': ['locked', 'restricted', 'blocked'],
            'unusual': ['suspicious', 'strange', 'abnormal']
        };
        
        function selectAttackType(btn) {
            document.querySelectorAll('.attack-type-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentAttackType = btn.dataset.type;
            document.getElementById('attackDescription').innerHTML = attackDescriptions[currentAttackType] || '<p>未知攻击类型</p>';
        }
        
        document.getElementById('attackIntensity').addEventListener('input', function() {
            document.getElementById('intensityValue').textContent = this.value;
        });
        
        function loadPreset(type) {
            const presets = {
                phishing: '尊敬的用户，您的银行账户存在异常登录，请立即点击 http://secure-bank-verify.com 登录验证，否则账户将在24小时内被冻结。请勿将此信息告知他人。',
                legitimate: 'Hi John, hope you are doing well. Just wanted to remind you about our team meeting tomorrow at 2pm. Please bring your project update. Thanks, Sarah'
            };
            document.getElementById('originalEmail').value = presets[type] || '';
            addLog('加载预设', `${type === 'phishing' ? '钓鱼' : '正常'}样本`);
        }
        
        function clearInput() {
            document.getElementById('originalEmail').value = '';
            document.getElementById('attackedCard').style.display = 'none';
        }
        
        function generateAttack() {
            const original = document.getElementById('originalEmail').value;
            if (!original.trim()) {
                alert('请先输入邮件内容');
                return;
            }
            
            const intensity = parseInt(document.getElementById('attackIntensity').value) / 100;
            let result = { text: '', changes: [], count: 0 };
            
            switch (currentAttackType) {
                case 'homoglyph': result = applyHomoglyphAttack(original, intensity); break;
                case 'zerowidth': result = applyZeroWidthAttack(original, intensity); break;
                case 'unicode': result = applyUnicodeAttack(original, intensity); break;
                case 'synonym': result = applySynonymAttack(original, intensity); break;
                case 'spaces': result = applySpaceAttack(original, intensity); break;
                case 'encoding': result = applyEncodingAttack(original, intensity); break;
                case 'url_encode': result = applyUrlEncodeAttack(original, intensity); break;
                case 'html_entities': result = applyHtmlEntitiesAttack(original, intensity); break;
                case 'random': result = applyRandomAttack(original, intensity); break;
            }
            
            document.getElementById('attackedCard').style.display = 'block';
            document.getElementById('attackedPreview').innerHTML = highlightChanges(original, result.text);
            
            let detailsHtml = `<div style="margin-bottom: 0.5rem;"><strong>共 ${result.count} 处变形:</strong></div>`;
            result.changes.forEach(c => {
                detailsHtml += `<div class="mb-1"><code style="color: var(--blue);">${c.from}</code> → <code style="color: var(--red);">${c.to}</code></div>`;
            });
            document.getElementById('attackDetails').innerHTML = detailsHtml;
            
            window._attackedText = result.text;
            addLog('生成对抗样本', `${currentAttackType} - ${result.count}处变形`);
        }
        
        function highlightChanges(original, attacked) {
            let result = '';
            for (let i = 0; i < attacked.length; i++) {
                if (i < original.length && attacked[i] !== original[i]) {
                    result += `<span class="diff-char-attacked">${escapeHtml(attacked[i])}</span>`;
                } else {
                    result += `<span class="diff-char-normal">${escapeHtml(attacked[i])}</span>`;
                }
            }
            return result;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function applyHomoglyphAttack(text, intensity) {
            let result = '';
            let changes = [];
            let count = 0;
            
            for (let char of text) {
                const lower = char.toLowerCase();
                if (homoglyphMap[lower] && Math.random() < intensity) {
                    const replacements = homoglyphMap[lower];
                    const replacement = replacements[Math.floor(Math.random() * replacements.length)];
                    result += replacement;
                    changes.push({ from: char, to: replacement });
                    count++;
                } else {
                    result += char;
                }
            }
            
            return { text: result, changes, count };
        }
        
        function applyZeroWidthAttack(text, intensity) {
            let result = '';
            let count = 0;
            
            for (let i = 0; i < text.length; i++) {
                result += text[i];
                if (Math.random() < intensity * 0.4) {
                    const zwc = zeroWidthChars[Math.floor(Math.random() * zeroWidthChars.length)];
                    result += zwc;
                    count++;
                }
            }
            
            return { 
                text: result, 
                changes: [{ from: '(正常文本)', to: `插入${count}个零宽字符` }], 
                count 
            };
        }
        
        function applyUnicodeAttack(text, intensity) {
            let result = '';
            let changes = [];
            let count = 0;
            
            for (let char of text) {
                const lower = char.toLowerCase();
                if (unicodeSynonyms[lower] && Math.random() < intensity * 0.3) {
                    const synonyms = unicodeSynonyms[lower];
                    const replacement = synonyms[Math.floor(Math.random() * synonyms.length)];
                    result += replacement;
                    changes.push({ from: char, to: replacement });
                    count++;
                } else {
                    result += char;
                }
            }
            
            return { text: result, changes, count };
        }
        
        function applySynonymAttack(text, intensity) {
            let result = text;
            let changes = [];
            let count = 0;
            
            for (let [word, synonyms] of Object.entries(synonymMap)) {
                if (result.toLowerCase().includes(word.toLowerCase()) && Math.random() < intensity) {
                    const synonym = synonyms[Math.floor(Math.random() * synonyms.length)];
                    const regex = new RegExp(word, 'gi');
                    result = result.replace(regex, synonym);
                    changes.push({ from: word, to: synonym });
                    count++;
                }
            }
            
            return { text: result, changes, count };
        }
        
        function applySpaceAttack(text, intensity) {
            let result = '';
            let changes = [];
            let count = 0;
            
            const words = text.split(/(\s+)/);
            for (let word of words) {
                if (word.trim().length > 3 && Math.random() < intensity * 0.5) {
                    const splitIdx = Math.floor(word.length / 2);
                    const modified = word.slice(0, splitIdx) + ' ' + word.slice(splitIdx);
                    result += modified;
                    changes.push({ from: word, to: modified });
                    count++;
                } else {
                    result += word;
                }
            }
            
            return { text: result, changes, count };
        }
        
        function applyEncodingAttack(text, intensity) {
            let result = text;
            let changes = [];
            let count = 0;
            
            const sensitiveWords = ['password', 'login', 'account', 'verify', '密码', '登录', '账户', '验证'];
            
            for (let word of sensitiveWords) {
                if (result.toLowerCase().includes(word.toLowerCase()) && Math.random() < intensity) {
                    const encoded = btoa(word);
                    result = result.replace(new RegExp(word, 'gi'), `=?UTF-8?B?${encoded}?=`);
                    changes.push({ from: word, to: `Base64编码` });
                    count++;
                }
            }
            
            return { text: result, changes, count };
        }
        
        function applyUrlEncodeAttack(text, intensity) {
            let result = text;
            let changes = [];
            let count = 0;
            
            const urlRegex = /https?:\/\/[^\s]+/gi;
            const urls = result.match(urlRegex) || [];
            
            for (let url of urls) {
                if (Math.random() < intensity) {
                    const encoded = url.split('').map(c => {
                        if (Math.random() < 0.3) {
                            return '%' + c.charCodeAt(0).toString(16).padStart(2, '0');
                        }
                        return c;
                    }).join('');
                    result = result.replace(url, encoded);
                    changes.push({ from: 'URL', to: 'URL编码' });
                    count++;
                }
            }
            
            return { text: result, changes, count };
        }
        
        function applyHtmlEntitiesAttack(text, intensity) {
            let result = '';
            let changes = [];
            let count = 0;
            
            const entityMap = {
                '<': '&lt;', '>': '&gt;', '&': '&amp;', '"': '&quot;', "'": '&#39;',
                ' ': '&nbsp;', '/': '&#47;', ':': '&#58;'
            };
            
            for (let char of text) {
                if (entityMap[char] && Math.random() < intensity * 0.3) {
                    result += entityMap[char];
                    changes.push({ from: char, to: entityMap[char] });
                    count++;
                } else {
                    result += char;
                }
            }
            
            return { text: result, changes, count };
        }
        
        function applyRandomAttack(text, intensity) {
            const attacks = ['homoglyph', 'zerowidth', 'unicode', 'synonym', 'spaces'];
            let result = text;
            let allChanges = [];
            let totalCount = 0;
            
            const numAttacks = Math.ceil(intensity * 3);
            for (let i = 0; i < numAttacks; i++) {
                const attack = attacks[Math.floor(Math.random() * attacks.length)];
                let attackResult;
                
                switch (attack) {
                    case 'homoglyph': attackResult = applyHomoglyphAttack(result, 0.3); break;
                    case 'zerowidth': attackResult = applyZeroWidthAttack(result, 0.2); break;
                    case 'unicode': attackResult = applyUnicodeAttack(result, 0.2); break;
                    case 'synonym': attackResult = applySynonymAttack(result, 0.3); break;
                    case 'spaces': attackResult = applySpaceAttack(result, 0.2); break;
                }
                
                if (attackResult) {
                    result = attackResult.text;
                    allChanges.push(...attackResult.changes.map(c => ({...c, attack})));
                    totalCount += attackResult.count;
                }
            }
            
            return { text: result, changes: allChanges, count: totalCount };
        }
        
        async function detectEmail(email, label) {
            try {
                const response = await fetch('/api/detection/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, source: '对抗测试' })
                });
                const data = await response.json();
                return { 
                    label: data.label, 
                    confidence: data.confidence || 0,
                    reason: data.reason || ''
                };
            } catch (e) {
                return { label: 'ERROR', confidence: 0, reason: e.message };
            }
        }
        
        function updateResultCard(id, result, label) {
            const el = document.getElementById(id);
            let cls = 'result-unknown', icon = '-', text = '未知';
            
            if (result.label === 'PHISHING') {
                cls = 'result-phishing'; icon = '🚨'; text = '钓鱼';
            } else if (result.label === 'SUSPICIOUS') {
                cls = 'result-suspicious'; icon = '⚠️'; text = '可疑';
            } else if (result.label === 'SAFE') {
                cls = 'result-safe'; icon = '✅'; text = '安全';
            }
            
            el.className = `result-card ${cls}`;
            el.innerHTML = `
                <div style="font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.5rem;">${label}</div>
                <div style="font-size: 2rem;">${icon}</div>
                <div style="font-size: 1rem; font-weight: 600;">${text}</div>
                <div style="font-size: 0.75rem; color: var(--text-muted);">置信度: ${(result.confidence * 100).toFixed(1)}%</div>
            `;
            
            addLog(`检测${label}`, `${result.label} (${(result.confidence*100).toFixed(1)}%)`);
        }
        
        async function testOriginal() {
            const email = document.getElementById('originalEmail').value;
            testResults.original = await detectEmail(email, '原始');
            updateResultCard('originalResult', testResults.original, '原始邮件');
            evaluateRobustness();
        }
        
        async function testAttacked() {
            if (!window._attackedText) {
                alert('请先生成对抗样本');
                return;
            }
            testResults.attacked = await detectEmail(window._attackedText, '对抗');
            updateResultCard('attackedResult', testResults.attacked, '对抗样本');
            evaluateRobustness();
        }
        
        function evaluateRobustness() {
            const section = document.getElementById('robustnessSection');
            if (!testResults.original || !testResults.attacked) {
                section.style.display = 'none';
                return;
            }
            
            section.style.display = 'block';
            
            const orig = testResults.original.label;
            const att = testResults.attacked.label;
            
            let robustness = 0;
            let label = '';
            let analysis = '';
            let color = '';
            
            if (orig === att) {
                robustness = 100;
                label = '鲁棒性优秀';
                analysis = '系统成功识别了经过变形攻击的邮件，检测结果完全一致。';
                color = 'var(--green)';
            } else if ((orig === 'PHISHING' && att === 'SUSPICIOUS') || (orig === 'SUSPICIOUS' && att === 'PHISHING')) {
                robustness = 70;
                label = '鲁棒性良好';
                analysis = '虽然检测结果有差异，但系统仍然识别出了风险。';
                color = 'var(--amber)';
            } else if (orig === 'PHISHING' && att === 'SAFE') {
                robustness = 30;
                label = '检测到逃逸攻击';
                analysis = '对抗样本成功绕过了检测，建议增加对抗样本训练数据。';
                color = 'var(--red)';
            } else {
                robustness = 50;
                label = '结果有差异';
                analysis = '检测结果存在差异，需要进一步分析。';
                color = 'var(--amber)';
            }
            
            document.getElementById('robustnessBar').style.width = robustness + '%';
            document.getElementById('robustnessBar').style.background = color;
            document.getElementById('robustnessLabel').textContent = label;
            document.getElementById('robustnessLabel').style.color = color;
            document.getElementById('robustnessScore').textContent = robustness + '%';
            document.getElementById('robustnessAnalysis').textContent = analysis;
            
            addLog('鲁棒性评估', `${label} (${robustness}%)`);
        }
        
        async function batchTest() {
            const original = document.getElementById('originalEmail').value;
            if (!original.trim()) {
                alert('请先输入邮件内容');
                return;
            }
            
            batchResults = [];
            const intensity = parseInt(document.getElementById('attackIntensity').value) / 100;
            const attacks = ['homoglyph', 'zerowidth', 'unicode', 'synonym', 'spaces'];
            
            addLog('批量测试', '开始测试所有攻击方式...');
            
            for (let attack of attacks) {
                currentAttackType = attack;
                
                let result;
                switch (attack) {
                    case 'homoglyph': result = applyHomoglyphAttack(original, intensity); break;
                    case 'zerowidth': result = applyZeroWidthAttack(original, intensity); break;
                    case 'unicode': result = applyUnicodeAttack(original, intensity); break;
                    case 'synonym': result = applySynonymAttack(original, intensity); break;
                    case 'spaces': result = applySpaceAttack(original, intensity); break;
                }
                
                const detection = await detectEmail(result.text, attack);
                batchResults.push({
                    attack,
                    label: detection.label,
                    confidence: detection.confidence,
                    changes: result.count
                });
                
                addLog(`测试 ${attack}`, detection.label);
            }
            
            displayBatchResults();
        }
        
        function displayBatchResults() {
            const card = document.getElementById('batchResultCard');
            card.style.display = 'block';
            
            const success = batchResults.filter(r => r.label === testResults.original?.label).length;
            const failed = batchResults.length - success;
            const robustness = (success / batchResults.length * 100).toFixed(0);
            
            document.getElementById('batchStats').innerHTML = `
                <div class="mb-3">
                    <div style="font-size: 0.8rem; color: var(--text-secondary);">鲁棒性评分</div>
                    <div style="font-size: 2rem; font-weight: 700; color: ${robustness >= 80 ? 'var(--green)' : robustness >= 50 ? 'var(--amber)' : 'var(--red)'};">${robustness}%</div>
                </div>
                <div class="mb-2">
                    <span class="stat-mini"><span style="color: var(--green);">●</span> 通过: ${success}</span>
                    <span class="stat-mini"><span style="color: var(--red);">●</span> 失败: ${failed}</span>
                </div>
                <div style="font-size: 0.8rem;">
                    ${batchResults.map(r => `
                        <div class="mb-1">
                            <span class="stat-mini">${r.attack}: <strong style="color: ${r.label === testResults.original?.label ? 'var(--green)' : 'var(--red)'}">${r.label}</strong></span>
                        </div>
                    `).join('')}
                </div>
            `;
            
            const ctx = document.getElementById('robustnessChart').getContext('2d');
            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: batchResults.map(r => r.attack),
                    datasets: [{
                        label: '鲁棒性',
                        data: batchResults.map(r => r.label === testResults.original?.label ? 100 : 0),
                        backgroundColor: 'rgba(37, 99, 235, 0.2)',
                        borderColor: '#2563eb',
                        pointBackgroundColor: batchResults.map(r => r.label === testResults.original?.label ? '#10b981' : '#ef4444')
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        r: {
                            beginAtZero: true,
                            max: 100,
                            ticks: { display: false },
                            grid: { color: 'rgba(37, 99, 235, 0.1)' },
                            angleLines: { color: 'rgba(37, 99, 235, 0.1)' }
                        }
                    }
                }
            });
        }
        
        function addLog(action, detail) {
            const container = document.getElementById('logContainer');
            const empty = container.querySelector('div[style*="text-align"]');
            if (empty) empty.remove();
            
            const item = document.createElement('div');
            item.className = 'log-item';
            item.innerHTML = `
                <span class="log-time">${new Date().toLocaleTimeString()}</span>
                <span><strong style="color: var(--blue);">${action}</strong>: ${detail}</span>
            `;
            container.insertBefore(item, container.firstChild);
        }
        
        function clearLog() {
            document.getElementById('logContainer').innerHTML = `
                <div style="text-align: center; color: var(--text-muted); padding: 2rem;">
                    <i class="bi bi-inbox" style="font-size: 1.5rem;"></i>
                    <p style="margin-top: 0.5rem; font-size: 0.8rem;">暂无测试记录</p>
                </div>
            `;
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(testOriginal, 1000);
        });
    </script>
