<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>钓鱼邮件检测报告</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --bg-primary: #f5f5f7;
            --bg-secondary: #e8e8ed;
            --bg-card: #ffffff;
            --border-color: rgba(0, 0, 0, 0.08);
            --border-glow: rgba(0, 113, 227, 0.3);
            --text-primary: #1d1d1f;
            --text-secondary: #6e6e73;
            --text-muted: #86868b;
            --cyan: #0071e3;
            --cyan-light: #00c7be;
            --green: #34c759;
            --green-light: #30d158;
            --red: #ff3b30;
            --red-light: #ff453a;
            --amber: #ff9500;
            --amber-light: #ffb340;
            --purple: #af52de;
            --blue: #0071e3;
            --gradient-primary: linear-gradient(135deg, #0071e3 0%, #00c7be 100%);
            --gradient-success: linear-gradient(135deg, #34c759 0%, #00c7be 100%);
            --gradient-danger: linear-gradient(135deg, #ff3b30 0%, #ff9500 100%);
            --gradient-warning: linear-gradient(135deg, #ff9500 0%, #ffb340 100%);
            --shadow-card: 0 2px 12px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 30px rgba(0, 0, 0, 0.12);
            --radius-sm: 10px;
            --radius-md: 14px;
            --radius-lg: 18px;
            --radius-xl: 22px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: linear-gradient(180deg, #f5f5f7 0%, #ffffff 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: var(--text-primary);
            min-height: 100vh;
            font-weight: 400;
            letter-spacing: -0.01em;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23000000' fill-opacity='0.02'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 0.5px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 1px 0 rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 0.625rem 0;
        }

        .navbar-brand {
            font-weight: 600;
            font-size: 1.05rem;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            transition: color 0.3s;
        }

        .navbar-brand:hover {
            color: var(--blue);
        }

        .navbar-brand i { color: var(--blue); }

        .btn-nav {
            background: #ffffff;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn-nav:hover {
            border-color: var(--blue);
            color: var(--blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .main-container {
            position: relative;
            z-index: 1;
            padding: 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card-cyber {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-card);
            transition: all 0.3s ease;
            margin-bottom: 1.5rem;
        }

        .card-cyber:hover { box-shadow: var(--shadow-lg); }

        .card-header-cyber {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.05) 0%, rgba(6, 182, 212, 0.05) 100%);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 1.5rem;
        }

        .card-title-cyber {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--blue);
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 0;
        }

        .card-body-cyber { padding: 1.5rem; }

        .score-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto;
        }

        .score-value {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
        }

        .score-value.danger { color: var(--red); }
        .score-value.warning { color: var(--amber); }
        .score-value.success { color: var(--green); }

        .security-badge {
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius-xl);
            font-weight: 600;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .badge-malicious {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--red);
            color: var(--red);
        }

        .badge-suspicious {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid var(--amber);
            color: var(--amber);
        }

        .badge-safe {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--green);
            color: var(--green);
        }

        .detail-table {
            width: 100%;
            border-collapse: collapse;
        }

        .detail-table th {
            width: 140px;
            text-align: left;
            padding: 0.75rem 1rem;
            background: rgba(59, 130, 246, 0.05);
            color: var(--text-secondary);
            font-weight: 500;
            border-bottom: 1px solid var(--border-color);
        }

        .detail-table td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .badge-cyber {
            padding: 0.35rem 0.75rem;
            border-radius: var(--radius-sm);
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .badge-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--red);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .badge-success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--green);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .badge-warning {
            background: rgba(245, 158, 11, 0.1);
            color: var(--amber);
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .badge-info {
            background: rgba(59, 130, 246, 0.1);
            color: var(--blue);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .progress-cyber {
            height: 24px;
            background: rgba(59, 130, 246, 0.1);
            border-radius: var(--radius-sm);
            overflow: hidden;
        }

        .progress-bar-cyber {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.8rem;
            color: white;
            transition: width 0.5s ease;
        }

        .progress-bar-cyber.danger { background: var(--gradient-danger); }
        .progress-bar-cyber.warning { background: var(--gradient-warning); }
        .progress-bar-cyber.success { background: var(--gradient-success); }

        .risk-indicator {
            padding: 1rem 1.25rem;
            border-radius: var(--radius-md);
            margin-bottom: 0.75rem;
            border-left: 4px solid;
            background: #ffffff;
        }

        .risk-high {
            border-color: var(--red);
            background: rgba(239, 68, 68, 0.05);
        }

        .risk-medium {
            border-color: var(--amber);
            background: rgba(245, 158, 11, 0.05);
        }

        .risk-low {
            border-color: var(--green);
            background: rgba(16, 185, 129, 0.05);
        }

        .url-card, .attachment-card {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 1rem;
            margin-bottom: 0.75rem;
            transition: all 0.3s ease;
        }

        .url-card:hover, .attachment-card:hover {
            border-color: var(--border-glow);
            box-shadow: var(--shadow-card);
        }

        .url-card.danger { border-left: 3px solid var(--red); }
        .url-card.warning { border-left: 3px solid var(--amber); }
        .url-card.success { border-left: 3px solid var(--green); }

        .btn-cyber {
            background: #ffffff;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn-cyber:hover {
            border-color: var(--blue);
            color: var(--blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .btn-cyber.primary {
            background: var(--gradient-primary);
            border: none;
            color: white;
        }

        .btn-cyber.primary:hover {
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4);
            transform: translateY(-1px);
            color: white;
        }

        .btn-cyber.danger {
            border-color: var(--red);
            color: var(--red);
        }

        .btn-cyber.success {
            border-color: var(--green);
            color: var(--green);
        }

        .btn-cyber.warning {
            border-color: var(--amber);
            color: var(--amber);
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1rem;
        }

        .feature-card {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            overflow: hidden;
        }

        .feature-header {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.05) 0%, rgba(6, 182, 212, 0.05) 100%);
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            color: var(--blue);
        }

        .feature-body { padding: 1rem; }

        .feature-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(59, 130, 246, 0.1);
        }

        .feature-row:last-child { border-bottom: none; }

        .accordion-cyber .accordion-item {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            margin-bottom: 0.5rem;
            overflow: hidden;
        }

        .accordion-cyber .accordion-button {
            background: rgba(59, 130, 246, 0.05);
            color: var(--text-primary);
            font-weight: 500;
            padding: 1rem 1.25rem;
        }

        .accordion-cyber .accordion-button:not(.collapsed) {
            background: rgba(59, 130, 246, 0.1);
            color: var(--blue);
        }

        .accordion-cyber .accordion-body {
            background: #ffffff;
            color: var(--text-secondary);
        }

        .confirm-section {
            background: rgba(245, 158, 11, 0.05);
            border: 1px solid var(--amber);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-top: 1.5rem;
        }

        .confirm-section h6 {
            color: var(--amber);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .suspicious-list {
            background: #ffffff;
            border-radius: var(--radius-md);
            padding: 1rem;
            margin: 1rem 0;
            border: 1px solid var(--border-color);
        }

        .suspicious-list li {
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .suspicious-list li:last-child { border-bottom: none; }
        .suspicious-list li i { color: var(--amber); }

        .modal-content-cyber {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
        }

        .modal-header-cyber {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.05) 0%, rgba(6, 182, 212, 0.05) 100%);
            border-bottom: 1px solid var(--border-color);
            padding: 1.25rem 1.5rem;
        }

        .modal-title-cyber {
            font-family: 'Orbitron', sans-serif;
            color: var(--blue);
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        .modal-body-cyber {
            padding: 1.5rem;
            max-height: 70vh;
            overflow-y: auto;
        }

        .alert-cyber {
            padding: 1rem 1.25rem;
            border-radius: var(--radius-md);
            margin-bottom: 1rem;
            border-left: 4px solid;
            background: #ffffff;
        }

        .alert-cyber.success {
            background: rgba(16, 185, 129, 0.05);
            border-color: var(--green);
        }

        .alert-cyber.danger {
            background: rgba(239, 68, 68, 0.05);
            border-color: var(--red);
        }

        .alert-cyber.warning {
            background: rgba(245, 158, 11, 0.05);
            border-color: var(--amber);
        }

        .alert-cyber.info {
            background: rgba(59, 130, 246, 0.05);
            border-color: var(--blue);
        }

        .timeline {
            position: relative;
            padding-left: 30px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 10px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--border-color);
        }

        .timeline-item {
            position: relative;
            padding-bottom: 1.5rem;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -24px;
            top: 5px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--blue);
        }

        .timeline-item:last-child { padding-bottom: 0; }

        pre {
            background: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 1rem;
            color: var(--text-primary);
            font-size: 0.85rem;
            overflow-x: auto;
        }

        code {
            color: var(--blue);
            background: rgba(59, 130, 246, 0.1);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
        }

        .help-icon {
            position: relative;
            display: inline-block;
            cursor: help;
            color: var(--text-muted);
        }

        .help-icon:hover { color: var(--blue); }

        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--blue);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: var(--gradient-primary);
            border-radius: 2px;
        }

        @media (max-width: 768px) {
            .main-container { padding: 1rem; }
            .feature-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="/">
                <i class="bi bi-shield-check me-2"></i>
                PHISHING DETECTOR
            </a>
            <div class="d-flex gap-2">
                <a href="/" class="btn-nav">
                    <i class="bi bi-house me-1"></i> 返回首页
                </a>
                <button class="btn-nav" onclick="exportRawEmail()">
                    <i class="bi bi-file-earmark-text me-1"></i> 导出原邮件
                </button>
                <button class="btn-nav" onclick="aiAnalyze()">
                    <i class="bi bi-robot me-1"></i> AI分析
                </button>
                <button class="btn-nav" onclick="exportReport()">
                    <i class="bi bi-download me-1"></i> 导出报告
                </button>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <div class="card-cyber">
            <div class="card-header-cyber">
                <div class="d-flex justify-content-between align-items-center">
                    <h5 class="card-title-cyber">
                        <i class="bi bi-file-earmark-medical"></i>
                        钓鱼邮件检测报告
                    </h5>
                    <span style="color: var(--text-muted); font-size: 0.85rem;" id="report-info"></span>
                </div>
            </div>
            <div class="card-body-cyber">
                <h3 class="section-title">基础概览</h3>
                <div class="row">
                    <div class="col-md-6 text-center mb-4">
                        <h4 style="color: var(--text-secondary); margin-bottom: 1.5rem;">风险评分</h4>
                        <div class="score-container">
                            <canvas id="securityScoreChart"></canvas>
                            <div class="score-value" id="securityScoreValue">0%</div>
                        </div>
                        <div class="mt-4">
                            <span id="securityBadge" class="security-badge"></span>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <h4 style="color: var(--text-secondary); margin-bottom: 1rem;">判定信息</h4>
                        <table class="detail-table">
                            <tr><th>判定结果:</th><td id="verdict"></td></tr>
                            <tr><th>置信度:</th><td id="confidence"></td></tr>
                            <tr><th>风险评分:</th><td id="riskScore"></td></tr>
                            <tr><th>主要致因:</th><td id="keyReason"></td></tr>
                            <tr><th>处理建议:</th><td id="recommendation"></td></tr>
                        </table>

                        <div class="confirm-section" id="userConfirmSection" style="display: none;">
                            <h6><i class="bi bi-question-circle"></i> 请确认检测结果</h6>
                            <p style="color: var(--text-secondary); margin: 0.75rem 0;">系统检测到以下可疑项，请您确认是否为异常：</p>
                            <div id="suspiciousItems" class="suspicious-list"></div>
                            <div class="d-flex gap-2 flex-wrap">
                                <button class="btn-cyber success" onclick="confirmResult('safe')">
                                    <i class="bi bi-check-circle me-1"></i>确认安全
                                </button>
                                <button class="btn-cyber danger" onclick="confirmResult('phishing')">
                                    <i class="bi bi-exclamation-triangle me-1"></i>确认钓鱼
                                </button>
                                <button class="btn-cyber warning" onclick="confirmResult('uncertain')">
                                    <i class="bi bi-robot me-1"></i>请求AI分析
                                </button>
                            </div>
                        </div>

                        <div class="alert-cyber info" id="userConfirmResult" style="display: none;"></div>

                        <div class="mt-4 d-flex gap-2 flex-wrap">
                            <button class="btn-cyber primary" onclick="window.location.href='/dashboard'">
                                <i class="bi bi-arrow-left me-1"></i>再次检测
                            </button>
                            <button class="btn-cyber" onclick="showEmailContent()">
                                <i class="bi bi-envelope-open me-1"></i>查看邮件内容
                            </button>
                            <button class="btn-cyber success" id="tracebackBtn" onclick="goToTraceback()">
                                <i class="bi bi-diagram-3 me-1"></i>查看溯源分析
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card-cyber">
            <div class="card-header-cyber">
                <h5 class="card-title-cyber">
                    <i class="bi bi-envelope"></i>
                    邮件头信息分析
                    <span class="help-icon ms-2" title="显示邮件的头信息和身份验证状态">
                        <i class="bi bi-question-circle"></i>
                    </span>
                </h5>
            </div>
            <div class="card-body-cyber">
                <div class="row">
                    <div class="col-md-6 mb-4">
                        <h6 style="color: var(--blue); margin-bottom: 1rem;"><i class="bi bi-person me-2"></i>发件人详情</h6>
                        <table class="detail-table">
                            <tr><th>显示名称:</th><td id="resultFromName"></td></tr>
                            <tr><th>真实邮箱:</th><td id="resultFromEmail"></td></tr>
                            <tr><th>匹配性检查:</th><td id="nameMatchCheck"></td></tr>
                        </table>
                    </div>
                    <div class="col-md-6 mb-4">
                        <h6 style="color: var(--blue); margin-bottom: 1rem;"><i class="bi bi-info-circle me-2"></i>邮件基本信息</h6>
                        <table class="detail-table">
                            <tr><th>收件人:</th><td id="resultTo"></td></tr>
                            <tr><th>主题:</th><td id="resultSubject"></td></tr>
                            <tr><th>URL 数量:</th><td id="resultUrlCount"></td></tr>
                            <tr><th>附件数量:</th><td id="resultAttachmentCount"></td></tr>
                        </table>
                    </div>
                </div>
                <div class="mb-4">
                    <h6 style="color: var(--blue); margin-bottom: 1rem;"><i class="bi bi-shield-lock me-2"></i>身份验证结果</h6>
                    <div id="authStatus"></div>
                </div>
                <div>
                    <h6 style="color: var(--blue); margin-bottom: 1rem;"><i class="bi bi-route me-2"></i>路由路径</h6>
                    <div id="routePath"></div>
                </div>
            </div>
        </div>

        <div class="card-cyber">
            <div class="card-header-cyber">
                <h5 class="card-title-cyber">
                    <i class="bi bi-link-45deg"></i>
                    链接与附件分析
                </h5>
            </div>
            <div class="card-body-cyber">
                <div id="urlAnalysisSection" class="mb-4"></div>
                <div id="attachmentsSection"></div>
            </div>
        </div>

        <div class="card-cyber">
            <div class="card-header-cyber">
                <h5 class="card-title-cyber">
                    <i class="bi bi-cloud-check"></i>
                    云沙箱分析
                </h5>
            </div>
            <div class="card-body-cyber">
                <div id="sandboxAnalysisSection"></div>
            </div>
        </div>

        <div class="card-cyber">
            <div class="card-header-cyber">
                <h5 class="card-title-cyber">
                    <i class="bi bi-bar-chart"></i>
                    技术特征分析
                </h5>
            </div>
            <div class="card-body-cyber">
                <div id="highestRiskSection" class="mb-4"></div>
                <div id="moduleScoresSection" class="mb-4"></div>
                <div id="judgmentCriteriaSection" class="mb-4"></div>
                <div id="riskIndicators" class="mb-4"></div>
                <div id="featureAnalysisSection"></div>
            </div>
        </div>
    </div>

    <script>
        let securityScoreChart = null;
        let currentResult = null;

        document.addEventListener('DOMContentLoaded', function() {
            loadReportData();
        });

        async function loadReportData() {
            const urlParams = new URLSearchParams(window.location.search);
            const sessionId = urlParams.get('session');
            const alertId = urlParams.get('id');
            
            if (alertId) {
                try {
                    const response = await fetch(`/api/alerts/${alertId}`);
                    if (!response.ok) {
                        alert('报告数据不存在');
                        window.location.href = '/';
                        return;
                    }
                    currentResult = await response.json();
                    displayReport(currentResult);
                } catch (e) {
                    alert('加载报告失败: ' + e.message);
                    window.location.href = '/';
                }
            } else if (sessionId) {
                const storedData = localStorage.getItem(`phishing_report_${sessionId}`);
                if (storedData) {
                    currentResult = JSON.parse(storedData);
                    displayReport(currentResult);
                } else {
                    alert('报告数据不存在');
                    window.location.href = '/';
                }
            } else {
                alert('缺少报告会话ID');
                window.location.href = '/';
            }
        }

        function displayReport(result) {
            const reportId = generateReportId();
            const timestamp = new Date().toLocaleString();
            document.getElementById('report-info').textContent = `报告编号：${reportId} | 生成时间：${timestamp}`;
            
            const isPhish = result.label === 'PHISHING';
            updateSecurityScoreChart(result.confidence, isPhish, result.label);
            
            document.getElementById('verdict').innerHTML = `<span class="badge-cyber ${getLabelBadgeClass(result.label)}">${result.label}</span>`;
            document.getElementById('confidence').textContent = `${(result.confidence || 0).toFixed(2)}%`;
            document.getElementById('riskScore').textContent = `${Math.round((result.confidence || 0) * 100)}`;
            document.getElementById('keyReason').textContent = result.reason || '无';
            
            let recommendation;
            if (result.label === 'PHISHING') recommendation = '建议立即删除';
            else if (result.label === 'SUSPICIOUS') recommendation = '隔离审查';
            else recommendation = '可安全阅读';
            document.getElementById('recommendation').textContent = recommendation;
            
            const confirmSection = document.getElementById('userConfirmSection');
            const suspiciousItems = document.getElementById('suspiciousItems');
            
            confirmSection.style.display = 'block';
            
            const reasons = (result.reason || '').split('；').filter(r => r.trim());
            if (reasons.length > 0) {
                suspiciousItems.innerHTML = '<ul style="list-style: none; margin: 0; padding: 0;">' + 
                    reasons.map(r => `<li><i class="bi bi-exclamation-triangle"></i>${r.trim()}</li>`).join('') +
                    '</ul>';
            } else {
                suspiciousItems.innerHTML = `<p style="color: var(--text-muted);">系统检测结果: ${result.label}，请确认是否准确</p>`;
            }
            
            const parsed = result.parsed || {};
            document.getElementById('resultFromName').textContent = parsed.from_display_name || result.from_display_name || '-';
            document.getElementById('resultFromEmail').textContent = parsed.from_email || result.from_email || result.from_addr || '-';
            
            const fromName = parsed.from_display_name || result.from_display_name || '';
            const fromEmail = parsed.from_email || result.from_email || result.from_addr || '';
            let nameMatchCheck;
            if (fromName && fromEmail) {
                const domain = fromEmail.split('@')[1] || '';
                if (domain && fromName.toLowerCase().includes(domain.split('.')[0].toLowerCase())) {
                    nameMatchCheck = '<span class="badge-cyber badge-success">匹配</span>';
                } else {
                    nameMatchCheck = '<span class="badge-cyber badge-warning">不匹配</span>';
                }
            } else {
                nameMatchCheck = '-';
            }
            document.getElementById('nameMatchCheck').innerHTML = nameMatchCheck;
            
            document.getElementById('resultTo').textContent = parsed.to || result.to_addr || '-';
            document.getElementById('resultSubject').textContent = parsed.subject || result.subject || '-';
            document.getElementById('resultUrlCount').textContent = parsed.url_count || (result.urls ? result.urls.length : 0) || 0;
            const attachmentCount = parsed.attachment_count || (result.attachments ? result.attachments.length : 0) || 0;
            document.getElementById('resultAttachmentCount').innerHTML = attachmentCount > 0 ? `<span class="badge-cyber badge-warning">${attachmentCount}</span>` : '0';
            
            displayAuthStatus(result.headers);
            
            const riskIndicators = result.traceback?.risk_indicators || result.risk_indicators || [];
            displayRiskIndicators(riskIndicators, result.features);
            
            const attachments = result.attachments || (result.attachment_data ? JSON.parse(result.attachment_data) : []);
            displayAttachments(attachments);
            
            const urls = result.traceback?.url_analysis || result.urls || (result.url_data ? JSON.parse(result.url_data) : []);
            const htmlLinks = result.html_links || [];
            displayURLAnalysis(urls, htmlLinks);
            
            displayFeatureAnalysis(result.features);
            displaySandboxAnalysis(result.sandbox_analysis);
            displayHighestRiskFactors(result.highest_risk_module, result.highest_risk_score, result.reason);
            displayModuleScores(result.module_scores);
            displayJudgmentCriteria();
        }

        function getLabelBadgeClass(label) {
            if (label === 'PHISHING') return 'badge-danger';
            if (label === 'SUSPICIOUS') return 'badge-warning';
            return 'badge-success';
        }

        function displayRoutePath(traceback) {
            const container = document.getElementById('routePath');
            const emailSource = traceback?.email_source || {};
            
            if (!emailSource.hops || emailSource.hops.length === 0) {
                container.innerHTML = '<div class="alert-cyber info"><i class="bi bi-route me-2"></i>无路由路径信息</div>';
                return;
            }
            
            let html = '<div class="timeline">';
            emailSource.hops.forEach((hop, index) => {
                html += `<div class="timeline-item">
                    <div>
                        <h6 style="color: var(--blue);">Hop ${index + 1}</h6>
                        <p style="margin: 0.25rem 0; color: var(--text-secondary);"><strong>IP:</strong> ${hop.ip || '未知'}</p>
                        <p style="margin: 0.25rem 0; color: var(--text-secondary);"><strong>主机名:</strong> ${hop.hostname || '未知'}</p>
                        <p style="margin: 0.25rem 0; color: var(--text-secondary);"><strong>时间:</strong> ${hop.timestamp || '未知'}</p>
                    </div>
                </div>`;
            });
            html += '</div>';
            
            container.innerHTML = html;
        }

        function displayJudgmentCriteria() {
            const container = document.getElementById('judgmentCriteriaSection');
            
            let html = '<h6 style="color: var(--blue); margin-bottom: 1rem;">评判标准</h6>';
            html += '<div class="accordion accordion-cyber" id="judgmentCriteriaAccordion">';
            
            html += `<div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapsePhishing">
                        <span class="badge-cyber badge-danger me-2">钓鱼邮件</span> 判定标准
                    </button>
                </h2>
                <div id="collapsePhishing" class="accordion-collapse collapse">
                    <div class="accordion-body">
                        <table class="detail-table">
                            <tr><th>危险值区域</th><th>危险程度说明</th></tr>
                            <tr><td>置信度 ≥ 0.7</td><td>邮件包含明确的钓鱼特征</td></tr>
                            <tr><td>触发硬规则</td><td>沙箱检测到恶意代码、认证全部失败等</td></tr>
                        </table>
                    </div>
                </div>
            </div>`;
            
            html += `<div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseSuspicious">
                        <span class="badge-cyber badge-warning me-2">可疑邮件</span> 判定标准
                    </button>
                </h2>
                <div id="collapseSuspicious" class="accordion-collapse collapse">
                    <div class="accordion-body">
                        <table class="detail-table">
                            <tr><th>危险值区域</th><th>危险程度说明</th></tr>
                            <tr><td>0.4 ≤ 置信度 < 0.7</td><td>包含一些可疑特征，需进一步分析</td></tr>
                            <tr><td>部分风险指标</td><td>短链接、新注册域名、认证部分失败等</td></tr>
                        </table>
                    </div>
                </div>
            </div>`;
            
            html += `<div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseNormal">
                        <span class="badge-cyber badge-success me-2">正常邮件</span> 判定标准
                    </button>
                </h2>
                <div id="collapseNormal" class="accordion-collapse collapse">
                    <div class="accordion-body">
                        <table class="detail-table">
                            <tr><th>危险值区域</th><th>危险程度说明</th></tr>
                            <tr><td>置信度 < 0.4</td><td>未发现明显的钓鱼特征</td></tr>
                            <tr><td>认证通过</td><td>SPF/DKIM/DMARC认证通过</td></tr>
                        </table>
                    </div>
                </div>
            </div>`;
            
            html += '</div>';
            container.innerHTML = html;
        }

        function displayHighestRiskFactors(highestModule, highestScore, reason) {
            const container = document.getElementById('highestRiskSection');
            
            if (!highestModule) {
                container.innerHTML = '';
                return;
            }
            
            const moduleNames = {
                'header': '邮件头特征', 'url': 'URL特征', 'text': '文本特征',
                'attachment': '附件特征', 'html': 'HTML特征'
            };
            
            const scorePercentage = Math.round(highestScore * 100);
            let colorClass = scorePercentage >= 70 ? 'danger' : scorePercentage >= 40 ? 'warning' : 'success';
            let riskLevel = scorePercentage >= 70 ? '高风险' : scorePercentage >= 40 ? '中等风险' : '低风险';
            
            let html = `<div class="alert-cyber warning">
                <h6 style="color: var(--amber); margin-bottom: 1rem;"><i class="bi bi-exclamation-triangle-fill me-2"></i>最高风险因素</h6>
                <div style="background: #ffffff; border-radius: var(--radius-md); padding: 1rem; border: 1px solid var(--border-color);">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                        <strong>风险最高的模块</strong>
                        <span class="badge-cyber badge-${colorClass}">${riskLevel}</span>
                    </div>
                    <div class="progress-cyber" style="margin-bottom: 1rem;">
                        <div class="progress-bar-cyber ${colorClass}" style="width: ${scorePercentage}%">${moduleNames[highestModule]}: ${scorePercentage}%</div>
                    </div>
                    <div style="color: var(--text-secondary);"><strong>主要风险因素：</strong><br>${reason}</div>
                </div>
            </div>`;
            
            container.innerHTML = html;
        }

        function displayModuleScores(moduleScores) {
            const container = document.getElementById('moduleScoresSection');
            
            if (!moduleScores) {
                container.innerHTML = '<div class="alert-cyber info"><i class="bi bi-bar-chart me-2"></i>无模块评分信息</div>';
                return;
            }
            
            const moduleNames = {
                'header': '邮件头特征', 'url': 'URL特征', 'text': '文本特征',
                'attachment': '附件特征', 'html': 'HTML特征'
            };
            
            let html = '<h6 style="color: var(--blue); margin-bottom: 1rem;">模块评分</h6>';
            html += '<div class="row">';
            
            for (const [module, score] of Object.entries(moduleScores)) {
                const scorePercentage = Math.round(score * 100);
                let colorClass = scorePercentage >= 70 ? 'danger' : scorePercentage >= 40 ? 'warning' : 'success';
                let riskLevel = scorePercentage >= 70 ? '高风险' : scorePercentage >= 40 ? '中等风险' : '低风险';
                
                html += `<div class="col-md-6 mb-3">
                    <div class="feature-card">
                        <div class="feature-header">${moduleNames[module]}</div>
                        <div class="feature-body">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                                <span class="badge-cyber badge-${colorClass}">${riskLevel}</span>
                                <span>${scorePercentage}%</span>
                            </div>
                            <div class="progress-cyber">
                                <div class="progress-bar-cyber ${colorClass}" style="width: ${scorePercentage}%">${scorePercentage}%</div>
                            </div>
                        </div>
                    </div>
                </div>`;
            }
            
            html += '</div>';
            container.innerHTML = html;
        }

        function generateReportId() {
            const date = new Date();
            const dateStr = date.toISOString().slice(0, 10).replace(/-/g, '');
            const randomStr = Math.random().toString(36).substring(2, 10).toUpperCase();
            return `PHISH-${dateStr}-${randomStr}`;
        }

        function updateSecurityScoreChart(confidence, isPhish, label) {
            const safeConfidence = confidence || 0;
            const score = Math.round(safeConfidence * 100);
            const scoreValue = document.getElementById('securityScoreValue');
            scoreValue.textContent = score + '%';
            
            const badgeElement = document.getElementById('securityBadge');
            let color;
            
            if (label === 'PHISHING') {
                badgeElement.className = 'security-badge badge-malicious';
                badgeElement.innerHTML = '<i class="bi bi-exclamation-triangle-fill"></i> 钓鱼邮件';
                scoreValue.className = 'score-value danger';
                color = '#ef4444';
            } else if (label === 'SUSPICIOUS') {
                badgeElement.className = 'security-badge badge-suspicious';
                badgeElement.innerHTML = '<i class="bi bi-exclamation-circle-fill"></i> 可疑邮件';
                scoreValue.className = 'score-value warning';
                color = '#f59e0b';
            } else {
                badgeElement.className = 'security-badge badge-safe';
                badgeElement.innerHTML = '<i class="bi bi-check-circle-fill"></i> 正常邮件';
                scoreValue.className = 'score-value success';
                color = '#10b981';
            }
            
            const ctx = document.getElementById('securityScoreChart').getContext('2d');
            if (securityScoreChart) securityScoreChart.destroy();
            
            securityScoreChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    datasets: [{
                        data: [score, 100 - score],
                        backgroundColor: [color, 'rgba(59, 130, 246, 0.1)'],
                        borderWidth: 0
                    }]
                },
                options: {
                    cutout: '80%',
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: { legend: { display: false } }
                }
            });
        }

        function displayAuthStatus(headers) {
            const container = document.getElementById('authStatus');
            if (!headers) {
                container.innerHTML = '<span style="color: var(--text-muted);">无认证信息</span>';
                return;
            }

            const spf = headers.spf_result || 'unknown';
            const dkim = headers.dkim_result || 'unknown';
            const dmarc = headers.dmarc_result || 'unknown';

            const getStatusBadge = (status) => {
                if (status === 'pass') return '<span class="badge-cyber badge-success">通过</span>';
                if (status === 'fail') return '<span class="badge-cyber badge-danger">失败</span>';
                if (status === 'none') return '<span class="badge-cyber badge-warning">未设置</span>';
                return '<span class="badge-cyber badge-warning">未知</span>';
            };

            container.innerHTML = `
                <div style="margin-bottom: 0.75rem;">
                    <strong>SPF:</strong> ${getStatusBadge(spf)}
                    <small style="color: var(--text-muted); margin-left: 0.5rem;">验证发件人 IP 是否被授权</small>
                </div>
                <div style="margin-bottom: 0.75rem;">
                    <strong>DKIM:</strong> ${getStatusBadge(dkim)}
                    <small style="color: var(--text-muted); margin-left: 0.5rem;">验证邮件内容是否被篡改</small>
                </div>
                <div>
                    <strong>DMARC:</strong> ${getStatusBadge(dmarc)}
                    <small style="color: var(--text-muted); margin-left: 0.5rem;">综合认证策略</small>
                </div>
            `;
        }

        function displayRiskIndicators(indicators, features) {
            const container = document.getElementById('riskIndicators');
            let dynamicIndicators = [...indicators];

            if (features?.has_executable_attachment) {
                dynamicIndicators.push({ type: 'EXECUTABLE_ATTACHMENT', description: '邮件包含可执行文件附件', severity: 'high' });
            }
            if (features?.has_double_extension) {
                dynamicIndicators.push({ type: 'DOUBLE_EXTENSION', description: '发现双重扩展名文件', severity: 'high' });
            }
            if (features?.ip_address_count > 0) {
                dynamicIndicators.push({ type: 'IP_ADDRESS_URL', description: `发现 ${features.ip_address_count} 个使用 IP 地址的 URL`, severity: 'high' });
            }
            if (features?.short_url_count > 0) {
                dynamicIndicators.push({ type: 'SHORT_URL', description: `发现 ${features.short_url_count} 个短链接`, severity: 'medium' });
            }
            if (features?.has_hidden_links) {
                dynamicIndicators.push({ type: 'HIDDEN_LINKS', description: 'HTML 邮件中包含隐藏链接', severity: 'high' });
            }
            if (features?.has_form) {
                dynamicIndicators.push({ type: 'FORM_IN_EMAIL', description: '邮件中包含表单', severity: 'high' });
            }

            if (dynamicIndicators.length === 0) {
                container.innerHTML = '<div class="alert-cyber success"><i class="bi bi-shield-check me-2"></i>未发现明显风险指标</div>';
                return;
            }

            const seen = new Set();
            const uniqueIndicators = dynamicIndicators.filter(ind => {
                if (seen.has(ind.description)) return false;
                seen.add(ind.description);
                return true;
            });

            let html = '<h6 style="color: var(--blue); margin-bottom: 1rem;">风险指标</h6>';
            uniqueIndicators.forEach(ind => {
                const severityClass = ind.severity === 'high' ? 'risk-high' : ind.severity === 'medium' ? 'risk-medium' : 'risk-low';
                html += `<div class="risk-indicator ${severityClass}">
                    <strong>[${(ind.severity || '').toUpperCase()}]</strong> ${ind.description}
                </div>`;
            });
            container.innerHTML = html;
        }

        function displayAttachments(attachments) {
            const container = document.getElementById('attachmentsSection');

            if (!attachments || attachments.length === 0) {
                container.innerHTML = '<div class="alert-cyber info"><i class="bi bi-file-earmark me-2"></i>未发现附件</div>';
                return;
            }

            let html = '<h6 style="color: var(--blue); margin-bottom: 1rem;">附件分析</h6>';

            attachments.forEach((att) => {
                const isSuspicious = att.is_suspicious_type;
                const ext = att.filename.split('.').pop()?.toLowerCase() || '';

                let icon = 'bi-file-earmark';
                if (['exe', 'bat', 'cmd', 'scr', 'msi'].includes(ext)) icon = 'bi-file-earmark-lock';
                else if (['doc', 'docm', 'xls', 'xlsm'].includes(ext)) icon = 'bi-file-earmark-word';
                else if (['pdf'].includes(ext)) icon = 'bi-file-earmark-pdf';
                else if (['zip', 'rar', '7z'].includes(ext)) icon = 'bi-file-earmark-zip';

                html += `<div class="attachment-card" style="border-left: 3px solid ${isSuspicious ? 'var(--red)' : 'var(--green)'};">
                    <div style="display: flex; align-items: flex-start; gap: 1rem;">
                        <i class="bi ${icon}" style="font-size: 2rem; color: ${isSuspicious ? 'var(--red)' : 'var(--blue)'};"></i>
                        <div style="flex: 1;">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                                <strong>${att.filename}</strong>
                                ${isSuspicious ? '<span class="badge-cyber badge-danger">可疑</span>' : '<span class="badge-cyber badge-success">安全</span>'}
                            </div>
                            <div style="color: var(--text-secondary); font-size: 0.85rem;">
                                <span style="margin-right: 1rem;"><strong>类型:</strong> ${att.content_type}</span>
                                <span style="margin-right: 1rem;"><strong>大小:</strong> ${(att.size / 1024).toFixed(2)} KB</span>
                                <span><strong>MD5:</strong> <code>${att.md5 || 'N/A'}</code></span>
                            </div>
                        </div>
                    </div>
                </div>`;
            });

            container.innerHTML = html;
        }

        function displayURLAnalysis(urlAnalysis, htmlLinks) {
            const container = document.getElementById('urlAnalysisSection');
            const allUrls = [...(urlAnalysis || [])];

            if (allUrls.length === 0) {
                container.innerHTML = '<div class="alert-cyber info"><i class="bi bi-link-45deg me-2"></i>未发现 URL</div>';
                return;
            }

            let html = '<h6 style="color: var(--blue); margin-bottom: 1rem;">URL 分析</h6>';

            allUrls.forEach((urlInfo) => {
                const url = urlInfo.url || urlInfo;
                const risks = urlInfo.risks || [];
                const domainInfo = urlInfo.domain_info || {};

                let riskClass = 'success';
                let riskBadge = '<span class="badge-cyber badge-success">安全</span>';
                if (risks.length > 0) {
                    const hasHighRisk = risks.some(r => r.severity === 'high');
                    riskClass = hasHighRisk ? 'danger' : 'warning';
                    riskBadge = hasHighRisk ? '<span class="badge-cyber badge-danger">高风险</span>' : '<span class="badge-cyber badge-warning">中等风险</span>';
                }

                html += `<div class="url-card ${riskClass}">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                        <code>${url}</code>
                        ${riskBadge}
                    </div>`;

                if (domainInfo && domainInfo.domain) {
                    html += `<div style="color: var(--text-secondary); font-size: 0.85rem;">
                        <span style="margin-right: 1rem;"><strong>域名:</strong> ${domainInfo.domain}</span>
                        <span style="margin-right: 1rem;"><strong>域名年龄:</strong> ${domainInfo.age_days || 0} 天</span>
                        <span><strong>HTTPS:</strong> ${urlInfo.url?.startsWith('https') ? '是' : '否'}</span>
                    </div>`;
                }

                if (risks.length > 0) {
                    html += '<div style="margin-top: 0.5rem;">';
                    risks.forEach(risk => {
                        const badgeClass = risk.severity === 'high' ? 'badge-danger' : 'badge-warning';
                        html += `<span class="badge-cyber ${badgeClass}" style="margin-right: 0.25rem;">${risk.description}</span>`;
                    });
                    html += '</div>';
                }

                html += '</div>';
            });

            if (htmlLinks && htmlLinks.length > 0) {
                const forms = htmlLinks.filter(l => l.type === 'form' || (l.action && l.method));
                if (forms.length > 0) {

        async function exportRawEmail() {
            if (!currentResult || !currentResult.id) {
                alert('无法获取邮件ID');
                return;
            }
            
            const alertId = currentResult.id;
            const filename = `email_${alertId}.eml`;
            
            try {
                const response = await fetch(`/api/alerts/${alertId}/export`);
                if (!response.ok) { alert('下载失败'); return; }
                
                const blob = await response.blob();
                
                if (window.showSaveFilePicker) {
                    try {
                        const handle = await window.showSaveFilePicker({
                            suggestedName: filename,
                            types: [{ description: '邮件文件', accept: { 'message/rfc822': ['.eml'] } }]
                        });
                        const writable = await handle.createWritable();
                        await writable.write(blob);
                        await writable.close();
                        return;
                    } catch (e) { if (e.name === 'AbortError') return; }
                }
                
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            } catch (e) {
                alert('导出失败: ' + e.message);
            }
        }

                            types: [{ description: 'JSON报告文件', accept: { 'application/json': ['.json'] } }]
                        });
                        const writable = await handle.createWritable();
                        await writable.write(blob);
                        await writable.close();
                        return;
                    } catch (e) { if (e.name === 'AbortError') return; }
                }
                
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            } else {
                const alertId = currentResult.id;
                const filename = `report_${alertId}.json`;
                
                try {
                    const response = await fetch(`/api/alerts/${alertId}/export/json`);
                    if (!response.ok) { alert('下载失败'); return; }
                    
                    const blob = await response.blob();
                    
                    if (window.showSaveFilePicker) {
                        try {
                            const handle = await window.showSaveFilePicker({
                                suggestedName: filename,
                                types: [{ description: 'JSON报告文件', accept: { 'application/json': ['.json'] } }]
                            });
                            const writable = await handle.createWritable();
                            await writable.write(blob);
                            await writable.close();
                            return;
                        } catch (e) { if (e.name === 'AbortError') return; }
                    }
                    
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                } catch (e) {
                    alert('导出失败: ' + e.message);
                }
            }
        }
    </script>
</body>
</html>
