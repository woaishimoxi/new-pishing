<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>配置管理中心 - 钓鱼邮件检测系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <style>
        :root {
            --bg-primary: #f5f5f7;
            --bg-secondary: #e8e8ed;
            --bg-card: #ffffff;
            --bg-input: #f5f5f7;
            --border-color: rgba(0, 0, 0, 0.08);
            --border-glow: rgba(0, 113, 227, 0.3);
            --text-primary: #1d1d1f;
            --text-secondary: #6e6e73;
            --text-muted: #86868b;
            --cyan: #0071e3;
            --green: #34c759;
            --red: #ff3b30;
            --amber: #ff9500;
            --purple: #af52de;
            --blue: #0071e3;
            --gradient-primary: linear-gradient(135deg, #0071e3 0%, #00c7be 100%);
            --gradient-success: linear-gradient(135deg, #34c759 0%, #00c7be 100%);
            --gradient-danger: linear-gradient(135deg, #ff3b30 0%, #ff9500 100%);
            --gradient-purple: linear-gradient(135deg, #af52de 0%, #0071e3 100%);
            --shadow-card: 0 2px 12px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 30px rgba(0, 0, 0, 0.12);
            --radius-sm: 10px;
            --radius-md: 14px;
            --radius-lg: 18px;
        }

        * { box-sizing: border-box; }

        body { 
            background: linear-gradient(180deg, #f5f5f7 0%, #ffffff 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; 
            min-height: 100vh;
            color: var(--text-primary);
            font-weight: 400;
            letter-spacing: -0.01em;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%233b82f6' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }
        
        .navbar-custom { 
            background: rgba(255, 255, 255, 0.72); 
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 0.5px solid rgba(0, 0, 0, 0.1); 
            padding: 0.75rem 0;
            box-shadow: 0 1px 0 rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .navbar-brand {
            font-weight: 600;
            font-size: 1.05rem;
            text-decoration: none;
            color: var(--text-primary);
            letter-spacing: -0.02em;
            transition: color 0.3s;
        }
        
        .navbar-brand:hover {
            color: var(--blue);
        }
        
        .navbar-brand i { 
            color: var(--blue);
        }
        
        .main-container { padding: 2rem; max-width: 1400px; margin: 0 auto; position: relative; z-index: 1; }
        
        .page-header {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }
        
        .page-header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 200px;
            height: 2px;
            background: var(--gradient-primary);
        }
        
        .page-title {
            font-size: 1.75rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            letter-spacing: -0.02em;
        }
        
        .page-title i { color: var(--blue); }
        
        .page-desc {
            font-size: 1rem;
            color: var(--text-secondary);
            margin: 0;
            font-weight: 400;
        }
        
        .card-custom { 
            background: var(--bg-card); 
            border: none;
            border-radius: var(--radius-lg); 
            box-shadow: var(--shadow-card);
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .card-custom:hover {
            box-shadow: var(--shadow-lg);
        }
        
        .card-header-custom { 
            padding: 1.25rem 1.5rem; 
            border-bottom: 0.5px solid rgba(0, 0, 0, 0.06); 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            background: transparent;
        }
        
        .card-title { 
            font-size: 1rem; 
            font-weight: 600; 
            color: var(--text-primary); 
            margin: 0; 
            display: flex; 
            align-items: center; 
            gap: 0.5rem;
            letter-spacing: -0.01em;
        }
        
        .card-title i { color: var(--blue); }
        .card-title i.green { color: var(--green); }
        .card-title i.red { color: var(--red); }
        .card-title i.purple { color: var(--purple); }
        .card-title i.amber { color: var(--amber); }
        
        .card-body-custom { padding: 1.5rem; }

        .form-label {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }
        
        .form-control-custom { 
            background: var(--bg-input);
            border: 1px solid var(--border-color); 
            border-radius: var(--radius-md); 
            padding: 0.625rem 0.875rem; 
            font-size: 0.875rem;
            color: var(--text-primary);
            transition: all 0.3s;
        }
        
        .form-control-custom:focus { 
            background: var(--bg-input);
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            color: var(--text-primary);
        }
        
        .form-control-custom::placeholder { color: var(--text-muted); }
        
        .form-select.form-control-custom {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%232563eb' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.75rem center;
            background-size: 16px 12px;
            padding-right: 2.5rem;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            min-width: 180px;
        }
        
        .form-select.form-control-custom option {
            background: var(--bg-card);
            color: var(--text-primary);
            padding: 0.5rem;
        }
        
        .form-text { font-size: 0.7rem; color: var(--text-muted); }
        
        .form-check-input {
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
        }
        
        .form-check-input:checked {
            background-color: var(--blue);
            border-color: var(--blue);
        }
        
        .form-check-input:focus {
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            border-color: var(--blue);
        }
        
        .form-check-label { color: var(--text-secondary); }
        
        .btn-custom { 
            padding: 0.5rem 1rem; 
            border-radius: var(--radius-md); 
            font-size: 0.8125rem; 
            font-weight: 500; 
            transition: all 0.3s ease; 
            cursor: pointer;
            border: 1px solid transparent;
            font-family: 'Rajdhani', sans-serif;
            letter-spacing: 0.5px;
        }
        
        .btn-primary-custom { 
            background: var(--gradient-primary);
            border: none; 
            color: white;
            font-weight: 600;
        }
        
        .btn-primary-custom:hover { 
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4);
            transform: translateY(-1px);
            color: white;
        }
        
        .btn-outline-custom { 
            border: 1px solid var(--border-color); 
            background: white; 
            color: var(--text-secondary); 
        }
        
        .btn-outline-custom:hover { 
            border-color: var(--blue); 
            color: var(--blue);
            background: rgba(59, 130, 246, 0.05);
        }
        
        .btn-danger-custom { 
            background: var(--gradient-danger);
            border: none; 
            color: white;
        }
        
        .btn-danger-custom:hover { 
            box-shadow: 0 4px 14px rgba(239, 68, 68, 0.4);
            transform: translateY(-1px);
            color: white;
        }
        
        .btn-purple-custom {
            background: var(--gradient-purple);
            border: none;
            color: white;
        }
        
        .btn-purple-custom:hover {
            box-shadow: 0 4px 14px rgba(124, 58, 237, 0.4);
            transform: translateY(-1px);
            color: white;
        }
        
        .json-editor { 
            font-family: 'Consolas', 'Monaco', 'Fira Code', monospace; 
            font-size: 0.8125rem; 
            background: #1e293b; 
            color: #93c5fd; 
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md); 
            padding: 1rem; 
            min-height: 300px; 
            resize: vertical;
        }
        
        .json-editor:focus {
            border-color: var(--blue);
            outline: none;
        }
        
        .tag-list { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 0.5rem; 
        }
        
        .tag { 
            display: inline-flex; 
            align-items: center; 
            gap: 0.25rem; 
            padding: 0.375rem 0.75rem; 
            background: rgba(59, 130, 246, 0.1); 
            color: var(--blue); 
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: var(--radius-sm); 
            font-size: 0.75rem; 
            font-family: 'Rajdhani', monospace;
            transition: all 0.2s;
        }
        
        .tag:hover {
            background: rgba(59, 130, 246, 0.2);
        }
        
        .tag.danger { 
            background: rgba(239, 68, 68, 0.1); 
            color: var(--red); 
            border-color: rgba(239, 68, 68, 0.3);
        }
        
        .tag.danger:hover { 
            background: rgba(239, 68, 68, 0.2);
        }
        
        .tag.success { 
            background: rgba(16, 185, 129, 0.1); 
            color: var(--green); 
            border-color: rgba(16, 185, 129, 0.3);
        }
        
        .tag.success:hover { 
            background: rgba(16, 185, 129, 0.2);
        }
        
        .tag-remove { 
            cursor: pointer; 
            opacity: 0.7; 
            font-size: 1rem;
            line-height: 1;
        }
        
        .tag-remove:hover { opacity: 1; }
        
        .alert-toast { 
            position: fixed; 
            top: 1rem; 
            right: 1rem; 
            z-index: 9999; 
            min-width: 300px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
        }
        
        .alert-toast .toast {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
        }
        
        .input-group .form-control-custom {
            border-radius: var(--radius-md) 0 0 var(--radius-md);
        }
        
        .input-group .btn-custom {
            border-radius: 0 var(--radius-md) var(--radius-md) 0;
        }
        
        .config-section-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .text-muted { color: var(--text-muted) !important; }
        
        .row.g-3 > div { margin-bottom: 0.5rem; }
        
        @media (max-width: 768px) {
            .main-container { padding: 1rem; }
            .page-title { font-size: 1.25rem; }
            .card-header-custom {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.75rem;
            }
        }
        
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--gradient-primary);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <nav class="navbar-custom">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="/">
                <i class="bi bi-shield-check me-2"></i>
                PHISHING DETECTOR
            </a>
            <div class="d-flex gap-2">
                <a href="/domains" class="btn btn-outline-custom btn-custom">
                    <i class="bi bi-globe me-1"></i>域名管理
                </a>
                <a href="/" class="btn btn-outline-custom btn-custom">
                    <i class="bi bi-house me-1"></i>返回首页
                </a>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <div class="page-header">
            <h5 class="page-title">
                <i class="bi bi-gear"></i>配置管理中心
            </h5>
            <p class="page-desc">管理所有系统配置文件，无需手动编辑项目文件</p>
        </div>

        <div id="alert-container"></div>

        <div class="row">
            <div class="col-lg-5">
                <div class="card-custom">
                    <div class="card-header-custom">
                        <h5 class="card-title"><i class="bi bi-key"></i>系统配置</h5>
                    </div>
                    <div class="card-body-custom">
                        <div class="mb-4">
                            <label class="form-label">
                                <i class="bi bi-shield-check me-1" style="color: var(--blue);"></i>VirusTotal API
                            </label>
                            <input type="text" class="form-control form-control-custom" id="vt-api-key" placeholder="输入VirusTotal API Key">
                            <div class="form-text">用于URL威胁检测增强</div>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label">
                                <i class="bi bi-envelope me-1" style="color: var(--green);"></i>邮箱配置
                            </label>
                            <div class="row g-2 mb-2">
                                <div class="col-8">
                                    <input type="email" class="form-control form-control-custom" id="email-address" placeholder="邮箱地址">
                                </div>
                                <div class="col-4">
                                    <select class="form-select form-control-custom" id="email-protocol">
                                        <option value="imap">IMAP</option>
                                        <option value="pop3">POP3</option>
                                    </select>
                                </div>
                            </div>
                            <div class="row g-2 mb-2">
                                <div class="col-8">
                                    <input type="text" class="form-control form-control-custom" id="email-server" placeholder="服务器地址，如 imap.qq.com">
                                </div>
                                <div class="col-4">
                                    <input type="number" class="form-control form-control-custom" id="email-port" placeholder="端口" value="993">
                                </div>
                            </div>
                            <input type="password" class="form-control form-control-custom" id="email-password" placeholder="密码/授权码">
                            <div class="form-text">QQ邮箱需使用授权码</div>
                        </div>
                        
                        <button class="btn btn-primary-custom btn-custom w-100" onclick="saveApiConfig()">
                            <i class="bi bi-check-lg me-1"></i>保存配置
                        </button>
                        
                        <div class="d-flex gap-2 mt-2">
                            <button class="btn btn-outline-custom btn-custom flex-fill" onclick="testVirusTotal()">
                                <i class="bi bi-plug me-1"></i>测试VT
                            </button>
                            <button class="btn btn-outline-custom btn-custom flex-fill" onclick="testEmail()">
                                <i class="bi bi-plug me-1"></i>测试邮箱
                            </button>
                        </div>
                    </div>
                </div>

                <div class="card-custom">
                    <div class="card-header-custom">
                        <h5 class="card-title"><i class="bi bi-robot purple"></i>AI模型配置</h5>
                    </div>
                    <div class="card-body-custom">
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="bi bi-cpu me-1" style="color: var(--purple);"></i>AI服务提供商
                            </label>
                            <select class="form-select form-control-custom" id="ai-provider" onchange="updateAIConfig()">
                                <option value="openai">OpenAI (GPT-4)</option>
                                <option value="baidu">百度文心一言</option>
                                <option value="alibaba">阿里通义千问</option>
                                <option value="zhipu">智谱AI (ChatGLM)</option>
                                <option value="moonshot">月之暗面 (Kimi)</option>
                                <option value="custom">自定义API</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="bi bi-key me-1" style="color: var(--amber);"></i>API Key
                            </label>
                            <input type="password" class="form-control form-control-custom" id="ai-api-key" placeholder="输入AI服务的API Key">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="bi bi-link-45deg me-1" style="color: var(--blue);"></i>API URL
                            </label>
                            <input type="text" class="form-control form-control-custom" id="ai-api-url" placeholder="API地址，留空使用默认">
                            <div class="form-text" id="ai-url-hint">OpenAI: https://api.openai.com/v1/chat/completions</div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="bi bi-diagram-3 me-1" style="color: var(--green);"></i>模型名称
                            </label>
                            <input type="text" class="form-control form-control-custom" id="ai-model" placeholder="如 gpt-4, ernie-bot, qwen-turbo">
                            <div class="form-text" id="ai-model-hint">GPT-4: gpt-4, 文心一言: ernie-bot, 通义千问: qwen-turbo</div>
                        </div>
                        
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="ai-enabled">
                                <label class="form-check-label" for="ai-enabled">启用AI分析功能</label>
                            </div>
                        </div>
                        
                        <button class="btn btn-purple-custom btn-custom w-100" onclick="saveAIConfig()">
                            <i class="bi bi-check-lg me-1"></i>保存AI配置
                        </button>
                        
                        <button class="btn btn-outline-custom btn-custom w-100 mt-2" onclick="testAI()">
                            <i class="bi bi-lightning me-1"></i>测试AI连接
                        </button>
                    </div>
                </div>

                <div class="card-custom">
                    <div class="card-header-custom">
                        <h5 class="card-title"><i class="bi bi-shield-check green"></i>白名单管理</h5>
                    </div>
                    <div class="card-body-custom">
                        <div class="mb-3">
                            <div class="input-group">
                                <input type="text" class="form-control form-control-custom" id="whitelist-input" placeholder="输入域名，如 example.com">
                                <button class="btn btn-primary-custom btn-custom" onclick="addWhitelist()">添加</button>
                            </div>
                        </div>
                        <div class="tag-list" id="whitelist-tags">
                            <span class="text-muted">加载中...</span>
                        </div>
                    </div>
                </div>

                <div class="card-custom">
                    <div class="card-header-custom">
                        <h5 class="card-title"><i class="bi bi-shield-x red"></i>黑名单管理</h5>
                    </div>
                    <div class="card-body-custom">
                        <div class="mb-3">
                            <div class="input-group mb-2">
                                <input type="text" class="form-control form-control-custom" id="blacklist-domain-input" placeholder="输入域名">
                                <button class="btn btn-danger-custom btn-custom" onclick="addBlacklistDomain()">添加域名</button>
                            </div>
                            <div class="input-group">
                                <input type="text" class="form-control form-control-custom" id="blacklist-ip-input" placeholder="输入IP地址">
                                <button class="btn btn-danger-custom btn-custom" onclick="addBlacklistIP()">添加IP</button>
                            </div>
                        </div>
                        <div class="config-section-title">
                            <i class="bi bi-globe" style="color: var(--red);"></i>域名
                        </div>
                        <div class="tag-list mb-3" id="blacklist-domain-tags">
                            <span class="text-muted">加载中...</span>
                        </div>
                        <div class="config-section-title">
                            <i class="bi bi-hdd-network" style="color: var(--red);"></i>IP地址
                        </div>
                        <div class="tag-list" id="blacklist-ip-tags">
                            <span class="text-muted">加载中...</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-7">
                <div class="card-custom">
                    <div class="card-header-custom">
                        <h5 class="card-title"><i class="bi bi-database purple"></i>IOC威胁情报库</h5>
                        <button class="btn btn-outline-custom btn-custom" onclick="editConfig('ioc_database.json')">
                            <i class="bi bi-pencil me-1"></i>高级编辑
                        </button>
                    </div>
                    <div class="card-body-custom">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">恶意IP</label>
                                <div class="input-group mb-2">
                                    <input type="text" class="form-control form-control-custom" id="ioc-ip-input" placeholder="1.2.3.4">
                                    <button class="btn btn-outline-custom btn-custom" onclick="addIOC('malicious_ips')">添加</button>
                                </div>
                                <div class="tag-list" id="ioc-ips" style="max-height: 100px; overflow-y: auto;">
                                    <span class="text-muted">加载中...</span>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">恶意域名</label>
                                <div class="input-group mb-2">
                                    <input type="text" class="form-control form-control-custom" id="ioc-domain-input" placeholder="malicious.com">
                                    <button class="btn btn-outline-custom btn-custom" onclick="addIOC('malicious_domains')">添加</button>
                                </div>
                                <div class="tag-list" id="ioc-domains" style="max-height: 100px; overflow-y: auto;">
                                    <span class="text-muted">加载中...</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card-custom">
                    <div class="card-header-custom">
                        <h5 class="card-title"><i class="bi bi-code-slash"></i>JSON编辑器</h5>
                        <div class="d-flex gap-2">
                            <select class="form-select form-control-custom" id="file-selector" style="width: auto;" onchange="loadFileContent()">
                                <option value="api_config.json">API配置</option>
                                <option value="whitelist.json">白名单</option>
                                <option value="blacklist.json">黑名单</option>
                                <option value="ioc_database.json">IOC数据库</option>
                            </select>
                        </div>
                    </div>
                    <div class="card-body-custom">
                        <textarea class="json-editor w-100" id="json-editor" spellcheck="false"></textarea>
                        <div class="d-flex justify-content-between mt-3">
                            <button class="btn btn-outline-custom btn-custom" onclick="formatJSON()">
                                <i class="bi bi-code me-1"></i>格式化
                            </button>
                            <div class="d-flex gap-2">
                                <button class="btn btn-outline-custom btn-custom" onclick="restoreBackup()">
                                    <i class="bi bi-arrow-counterclockwise me-1"></i>恢复备份
                                </button>
                                <button class="btn btn-primary-custom btn-custom" onclick="saveJSON()">
                                    <i class="bi bi-check-lg me-1"></i>保存
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="alert-toast" id="toast-container"></div>

    <script>
        let currentData = {};

        document.addEventListener('DOMContentLoaded', function() {
            loadAllConfigs();
            loadFileContent();
        });

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const bgClass = type === 'success' ? 'bg-success' : type === 'error' ? 'bg-danger' : 'bg-warning';
            container.innerHTML = `
                <div class="toast show ${bgClass} text-white" role="alert">
                    <div class="toast-body d-flex align-items-center">
                        <i class="bi bi-${type === 'success' ? 'check-circle' : 'exclamation-circle'} me-2"></i>
                        ${message}
                    </div>
                </div>
            `;
            setTimeout(() => container.innerHTML = '', 3000);
        }

        async function loadAllConfigs() {
            try {
                const apiResp = await fetch('/api/settings/file/api_config.json');
                const apiData = await apiResp.json();
                if (apiData.content) {
                    currentData.api = apiData.content;
                    renderAPIPreview(apiData.content);
                }

                const whiteResp = await fetch('/api/settings/file/whitelist.json');
                const whiteData = await whiteResp.json();
                if (whiteData.content) {
                    currentData.whitelist = whiteData.content;
                    renderWhitelist(whiteData.content.trusted_domains || []);
                }

                const blackResp = await fetch('/api/settings/file/blacklist.json');
                const blackData = await blackResp.json();
                if (blackData.content) {
                    currentData.blacklist = blackData.content;
                    renderBlacklist(blackData.content);
                }

                const iocResp = await fetch('/api/settings/file/ioc_database.json');
                const iocData = await iocResp.json();
                if (iocData.content) {
                    currentData.ioc = iocData.content;
                    renderIOC(iocData.content);
                }
            } catch (e) {
                showToast('加载配置失败: ' + e.message, 'error');
            }
        }

        function renderAPIPreview(config) {
            document.getElementById('vt-api-key').value = config.virustotal?.api_key || '';
            document.getElementById('email-address').value = config.email?.email || '';
            document.getElementById('email-password').value = config.email?.password || '';
            document.getElementById('email-server').value = config.email?.server || '';
            document.getElementById('email-protocol').value = config.email?.protocol || 'imap';
            document.getElementById('email-port').value = config.email?.port || 993;
            
            if (config.ai) {
                document.getElementById('ai-provider').value = config.ai.provider || 'openai';
                document.getElementById('ai-api-key').value = config.ai.api_key || '';
                document.getElementById('ai-api-url').value = config.ai.api_url || '';
                document.getElementById('ai-model').value = config.ai.model || '';
                document.getElementById('ai-enabled').checked = config.ai.enabled || false;
                updateAIConfig();
            }
        }

        async function saveApiConfig() {
            const config = {
                virustotal: {
                    api_key: document.getElementById('vt-api-key').value,
                    api_url: 'https://www.virustotal.com/vtapi/v2/url/report'
                },
                ipapi: {
                    api_url: 'http://ip-api.com/json/'
                },
                email: {
                    email: document.getElementById('email-address').value,
                    password: document.getElementById('email-password').value,
                    server: document.getElementById('email-server').value,
                    protocol: document.getElementById('email-protocol').value,
                    port: parseInt(document.getElementById('email-port').value) || 993,
                    enabled: !!document.getElementById('email-address').value
                }
            };
            
            try {
                const resp = await fetch('/api/settings/file/api_config.json', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: config })
                });
                
                const data = await resp.json();
                if (data.success) {
                    showToast('配置已保存');
                    currentData.api = config;
                } else {
                    showToast(data.error || '保存失败', 'error');
                }
            } catch (e) {
                showToast('保存失败: ' + e.message, 'error');
            }
        }

        async function testVirusTotal() {
            try {
                const config = {
                    virustotal: {
                        api_key: document.getElementById('vt-api-key').value,
                        api_url: 'https://www.virustotal.com/vtapi/v2/url/report'
                    },
                    ipapi: {
                        api_url: 'http://ip-api.com/json/'
                    },
                    email: {
                        email: document.getElementById('email-address').value,
                        password: document.getElementById('email-password').value,
                        server: document.getElementById('email-server').value,
                        protocol: document.getElementById('email-protocol').value,
                        port: parseInt(document.getElementById('email-port').value) || 993,
                        enabled: !!document.getElementById('email-address').value
                    }
                };
                
                if (!config.virustotal.api_key) {
                    showToast('请先填写VirusTotal API Key', 'error');
                    return;
                }
                
                await fetch('/api/settings/file/api_config.json', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: config })
                });
                
                const resp = await fetch('/api/config/test');
                const data = await resp.json();
                if (data.status === 'success') {
                    showToast('VirusTotal连接成功');
                } else {
                    showToast(data.message || '连接失败', 'error');
                }
            } catch (e) {
                showToast('测试失败: ' + e.message, 'error');
            }
        }

        async function testEmail() {
            try {
                const config = {
                    virustotal: {
                        api_key: document.getElementById('vt-api-key').value,
                        api_url: 'https://www.virustotal.com/vtapi/v2/url/report'
                    },
                    ipapi: {
                        api_url: 'http://ip-api.com/json/'
                    },
                    email: {
                        email: document.getElementById('email-address').value,
                        password: document.getElementById('email-password').value,
                        server: document.getElementById('email-server').value,
                        protocol: document.getElementById('email-protocol').value,
                        port: parseInt(document.getElementById('email-port').value) || 993,
                        enabled: !!document.getElementById('email-address').value
                    }
                };
                
                if (!config.email.email || !config.email.password || !config.email.server) {
                    showToast('请先填写邮箱配置（邮箱地址、密码、服务器）', 'error');
                    return;
                }
                
                await fetch('/api/settings/file/api_config.json', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: config })
                });
                
                const resp = await fetch('/api/config/test-email');
                const data = await resp.json();
                if (data.status === 'success') {
                    showToast('邮箱连接成功');
                } else {
                    showToast(data.message || '连接失败', 'error');
                }
            } catch (e) {
                showToast('测试失败: ' + e.message, 'error');
            }
        }

        const AI_PROVIDERS = {
            openai: { url: 'https://api.openai.com/v1/chat/completions', model: 'gpt-4', hint: 'GPT-4: gpt-4, GPT-3.5: gpt-3.5-turbo' },
            baidu: { url: 'https://aip.baidubce.com/rpc/2.0/ai_custom/v1/wenxinworkshop/chat/completions', model: 'ernie-bot-4', hint: '文心一言4.0: ernie-bot-4, 文心一言: ernie-bot' },
            alibaba: { url: 'https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation', model: 'qwen-turbo', hint: '通义千问: qwen-turbo, qwen-plus, qwen-max' },
            zhipu: { url: 'https://open.bigmodel.cn/api/paas/v4/chat/completions', model: 'glm-4', hint: 'ChatGLM4: glm-4, ChatGLM3: glm-3-turbo' },
            moonshot: { url: 'https://api.moonshot.cn/v1/chat/completions', model: 'moonshot-v1-8k', hint: 'Kimi: moonshot-v1-8k, moonshot-v1-32k, moonshot-v1-128k' },
            custom: { url: '', model: '', hint: '自定义API地址和模型名称' }
        };

        function updateAIConfig() {
            const provider = document.getElementById('ai-provider').value;
            const config = AI_PROVIDERS[provider];
            
            document.getElementById('ai-api-url').value = config.url;
            document.getElementById('ai-api-url').placeholder = provider === 'custom' ? '输入API地址' : config.url;
            document.getElementById('ai-model').placeholder = config.model;
            document.getElementById('ai-url-hint').textContent = provider === 'custom' ? '支持OpenAI兼容格式的API' : `默认: ${config.url}`;
            document.getElementById('ai-model-hint').textContent = config.hint;
        }

        async function saveAIConfig() {
            const provider = document.getElementById('ai-provider').value;
            const modelInput = document.getElementById('ai-model').value;
            const defaultModel = AI_PROVIDERS[provider]?.model || 'gpt-4';
            
            const config = {
                ai: {
                    provider: provider,
                    api_key: document.getElementById('ai-api-key').value,
                    api_url: document.getElementById('ai-api-url').value,
                    model: modelInput || defaultModel,
                    enabled: document.getElementById('ai-enabled').checked
                }
            };
            
            try {
                const resp = await fetch('/api/settings/file/api_config.json');
                const data = await resp.json();
                const existingConfig = data.content || {};
                
                existingConfig.ai = config.ai;
                
                const saveResp = await fetch('/api/settings/file/api_config.json', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: existingConfig })
                });
                
                const saveData = await saveResp.json();
                if (saveData.success) {
                    showToast('AI配置已保存');
                } else {
                    showToast(saveData.error || '保存失败', 'error');
                }
            } catch (e) {
                showToast('保存失败: ' + e.message, 'error');
            }
        }

        async function testAI() {
            const apiKey = document.getElementById('ai-api-key').value;
            if (!apiKey) {
                showToast('请先填写API Key', 'error');
                return;
            }
            showToast('AI测试功能预留，请配置后在报告页面使用', 'warning');
        }

        function renderWhitelist(domains) {
            const container = document.getElementById('whitelist-tags');
            if (domains.length === 0) {
                container.innerHTML = '<span class="text-muted">暂无白名单</span>';
                return;
            }
            container.innerHTML = domains.slice(0, 30).map(d => `
                <span class="tag success">
                    ${d}
                    <span class="tag-remove" onclick="removeWhitelist('${d}')">&times;</span>
                </span>
            `).join('') + (domains.length > 30 ? `<span class="text-muted">...还有${domains.length - 30}个</span>` : '');
        }

        function renderBlacklist(data) {
            const domainContainer = document.getElementById('blacklist-domain-tags');
            const ipContainer = document.getElementById('blacklist-ip-tags');
            
            const domains = data.domains || [];
            const ips = data.ips || [];
            
            domainContainer.innerHTML = domains.length > 0 
                ? domains.slice(0, 20).map(d => `
                    <span class="tag danger">
                        ${d}
                        <span class="tag-remove" onclick="removeBlacklistDomain('${d}')">&times;</span>
                    </span>
                `).join('') + (domains.length > 20 ? `<span class="text-muted">...还有${domains.length - 20}个</span>` : '')
                : '<span class="text-muted">暂无域名</span>';
            
            ipContainer.innerHTML = ips.length > 0
                ? ips.map(ip => `
                    <span class="tag danger">
                        ${ip}
                        <span class="tag-remove" onclick="removeBlacklistIP('${ip}')">&times;</span>
                    </span>
                `).join('')
                : '<span class="text-muted">暂无IP</span>';
        }

        function renderIOC(data) {
            const ipContainer = document.getElementById('ioc-ips');
            const domainContainer = document.getElementById('ioc-domains');
            
            const ips = data.malicious_ips || [];
            const domains = data.malicious_domains || [];
            
            ipContainer.innerHTML = ips.length > 0
                ? ips.slice(0, 10).map(ip => `
                    <span class="tag danger">
                        ${ip}
                        <span class="tag-remove" onclick="removeIOC('malicious_ips', '${ip}')">&times;</span>
                    </span>
                `).join('') + (ips.length > 10 ? `<span class="text-muted">+${ips.length - 10}</span>` : '')
                : '<span class="text-muted">暂无</span>';
            
            domainContainer.innerHTML = domains.length > 0
                ? domains.slice(0, 10).map(d => `
                    <span class="tag danger">
                        ${d}
                        <span class="tag-remove" onclick="removeIOC('malicious_domains', '${d}')">&times;</span>
                    </span>
                `).join('') + (domains.length > 10 ? `<span class="text-muted">+${domains.length - 10}</span>` : '')
                : '<span class="text-muted">暂无</span>';
        }

        async function loadFileContent() {
            const filename = document.getElementById('file-selector').value;
            try {
                const resp = await fetch(`/api/settings/file/${filename}`);
                const data = await resp.json();
                if (data.content) {
                    document.getElementById('json-editor').value = JSON.stringify(data.content, null, 2);
                }
            } catch (e) {
                showToast('加载失败', 'error');
            }
        }

        function formatJSON() {
            const editor = document.getElementById('json-editor');
            try {
                const obj = JSON.parse(editor.value);
                editor.value = JSON.stringify(obj, null, 2);
                showToast('格式化成功');
            } catch (e) {
                showToast('JSON格式错误', 'error');
            }
        }

        async function saveJSON() {
            const filename = document.getElementById('file-selector').value;
            const editor = document.getElementById('json-editor');
            
            try {
                const content = JSON.parse(editor.value);
                
                const resp = await fetch(`/api/settings/file/${filename}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content })
                });
                
                const data = await resp.json();
                if (data.success) {
                    showToast('保存成功');
                    loadAllConfigs();
                } else {
                    showToast(data.error || '保存失败', 'error');
                }
            } catch (e) {
                showToast('JSON格式错误', 'error');
            }
        }

        async function restoreBackup() {
            const filename = document.getElementById('file-selector').value;
            if (!confirm('确定恢复备份？当前更改将丢失。')) return;
            
            try {
                const resp = await fetch(`/api/settings/file/${filename}/backup`, { method: 'POST' });
                const data = await resp.json();
                if (data.success) {
                    showToast('已恢复备份');
                    loadFileContent();
                    loadAllConfigs();
                } else {
                    showToast(data.error || '恢复失败', 'error');
                }
            } catch (e) {
                showToast('恢复失败', 'error');
            }
        }

        function editConfig(filename) {
            document.getElementById('file-selector').value = filename;
            loadFileContent();
            document.getElementById('json-editor').focus();
        }

        async function addWhitelist() {
            const input = document.getElementById('whitelist-input');
            const domain = input.value.trim();
            if (!domain) return;
            
            try {
                const resp = await fetch('/api/settings/whitelist/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ domains: [domain] })
                });
                const data = await resp.json();
                if (data.success) {
                    showToast('已添加到白名单');
                    input.value = '';
                    loadAllConfigs();
                } else {
                    showToast(data.error, 'error');
                }
            } catch (e) {
                showToast('添加失败', 'error');
            }
        }

        async function removeWhitelist(domain) {
            try {
                const resp = await fetch('/api/settings/whitelist/remove', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ domains: [domain] })
                });
                const data = await resp.json();
                if (data.success) {
                    showToast('已删除');
                    loadAllConfigs();
                }
            } catch (e) {
                showToast('删除失败', 'error');
            }
        }

        async function addBlacklistDomain() {
            const input = document.getElementById('blacklist-domain-input');
            const domain = input.value.trim();
            if (!domain) return;
            
            try {
                const resp = await fetch('/api/settings/blacklist/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ domains: [domain] })
                });
                const data = await resp.json();
                if (data.success) {
                    showToast('已添加到黑名单');
                    input.value = '';
                    loadAllConfigs();
                }
            } catch (e) {
                showToast('添加失败', 'error');
            }
        }

        async function addBlacklistIP() {
            const input = document.getElementById('blacklist-ip-input');
            const ip = input.value.trim();
            if (!ip) return;
            
            try {
                const resp = await fetch('/api/settings/blacklist/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ips: [ip] })
                });
                const data = await resp.json();
                if (data.success) {
                    showToast('已添加到黑名单');
                    input.value = '';
                    loadAllConfigs();
                }
            } catch (e) {
                showToast('添加失败', 'error');
            }
        }

        async function removeBlacklistDomain(domain) {
            try {
                const resp = await fetch('/api/settings/blacklist/remove', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ domains: [domain] })
                });
                const data = await resp.json();
                if (data.success) {
                    showToast('已删除');
                    loadAllConfigs();
                }
            } catch (e) {
                showToast('删除失败', 'error');
            }
        }

        async function removeBlacklistIP(ip) {
            try {
                const resp = await fetch('/api/settings/blacklist/remove', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ips: [ip] })
                });
                const data = await resp.json();
                if (data.success) {
                    showToast('已删除');
                    loadAllConfigs();
                }
            } catch (e) {
                showToast('删除失败', 'error');
            }
        }

        async function addIOC(type) {
            const inputId = type === 'malicious_ips' ? 'ioc-ip-input' : 'ioc-domain-input';
            const input = document.getElementById(inputId);
            const value = input.value.trim();
            if (!value) return;
            
            try {
                const resp = await fetch('/api/settings/ioc/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type, items: [value] })
                });
                const data = await resp.json();
                if (data.success) {
                    showToast('已添加');
                    input.value = '';
                    loadAllConfigs();
                }
            } catch (e) {
                showToast('添加失败', 'error');
            }
        }

        async function removeIOC(type, value) {
            try {
                const resp = await fetch('/api/settings/ioc/remove', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type, items: [value] })
                });
                const data = await resp.json();
                if (data.success) {
                    showToast('已删除');
                    loadAllConfigs();
                }
            } catch (e) {
                showToast('删除失败', 'error');
            }
        }
    </script>
</body>
</html>
