<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>溯源分析报告 - 钓鱼邮件检测系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --bg-primary: #f5f5f7;
            --bg-secondary: #e8e8ed;
            --bg-card: #ffffff;
            --border-color: rgba(0, 0, 0, 0.08);
            --border-glow: rgba(0, 113, 227, 0.3);
            --text-primary: #1d1d1f;
            --text-secondary: #6e6e73;
            --text-muted: #86868b;
            --cyan: #0071e3;
            --cyan-light: #00c7be;
            --green: #34c759;
            --green-light: #30d158;
            --red: #ff3b30;
            --red-light: #ff453a;
            --amber: #ff9500;
            --amber-light: #ffb340;
            --purple: #af52de;
            --blue: #0071e3;
            --gradient-primary: linear-gradient(135deg, #0071e3 0%, #00c7be 100%);
            --gradient-success: linear-gradient(135deg, #34c759 0%, #00c7be 100%);
            --gradient-danger: linear-gradient(135deg, #ff3b30 0%, #ff9500 100%);
            --gradient-warning: linear-gradient(135deg, #ff9500 0%, #ffb340 100%);
            --shadow-card: 0 2px 12px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 30px rgba(0, 0, 0, 0.12);
            --radius-sm: 10px;
            --radius-md: 14px;
            --radius-lg: 18px;
            --radius-xl: 22px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: linear-gradient(180deg, #f5f5f7 0%, #ffffff 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: var(--text-primary);
            min-height: 100vh;
            font-weight: 400;
            letter-spacing: -0.01em;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23000000' fill-opacity='0.02'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 0.5px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 1px 0 rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 0.625rem 0;
        }

        .navbar-brand {
            font-weight: 600;
            font-size: 1.05rem;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            transition: color 0.3s;
        }

        .navbar-brand:hover {
            color: var(--blue);
        }

        .navbar-brand i { color: var(--blue); }

        .btn-nav {
            background: #ffffff;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn-nav:hover {
            border-color: var(--blue);
            color: var(--blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .main-container {
            position: relative;
            z-index: 1;
            padding: 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .page-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--blue);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 0;
        }

        .page-subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }

        .card-cyber {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-card);
            transition: all 0.3s ease;
            margin-bottom: 1.5rem;
        }

        .card-cyber:hover { box-shadow: var(--shadow-lg); }

        .card-header-cyber {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.05) 0%, rgba(6, 182, 212, 0.05) 100%);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .card-title-cyber {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--blue);
            letter-spacing: 1px;
            margin: 0;
        }

        .card-body-cyber { padding: 1.5rem; }

        .risk-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.25rem;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 1rem;
        }

        .risk-high {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--red);
            color: var(--red);
        }

        .risk-medium {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid var(--amber);
            color: var(--amber);
        }

        .risk-low {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--green);
            color: var(--green);
        }

        .progress-cyber {
            height: 12px;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 6px;
            overflow: hidden;
            margin: 0.5rem 0;
        }

        .progress-fill-cyber {
            height: 100%;
            border-radius: 6px;
            transition: width 0.5s ease;
        }

        .progress-fill-cyber.high { background: var(--gradient-danger); }
        .progress-fill-cyber.medium { background: var(--gradient-warning); }
        .progress-fill-cyber.low { background: var(--gradient-success); }

        .dimension-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            overflow: hidden;
            height: 100%;
            transition: all 0.3s ease;
        }

        .dimension-card:hover { box-shadow: var(--shadow-lg); }

        .dimension-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.03) 0%, rgba(6, 182, 212, 0.03) 100%);
        }

        .dimension-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }

        .dimension-icon.blue { background: rgba(59, 130, 246, 0.1); color: var(--blue); border: 1px solid rgba(59, 130, 246, 0.3); }
        .dimension-icon.red { background: rgba(239, 68, 68, 0.1); color: var(--red); border: 1px solid rgba(239, 68, 68, 0.3); }
        .dimension-icon.green { background: rgba(16, 185, 129, 0.1); color: var(--green); border: 1px solid rgba(16, 185, 129, 0.3); }
        .dimension-icon.amber { background: rgba(245, 158, 11, 0.1); color: var(--amber); border: 1px solid rgba(245, 158, 11, 0.3); }
        .dimension-icon.purple { background: rgba(124, 58, 237, 0.1); color: var(--purple); border: 1px solid rgba(124, 58, 237, 0.3); }

        .dimension-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .dimension-body { padding: 1.25rem; }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.625rem 0;
            border-bottom: 1px solid rgba(59, 130, 246, 0.1);
            font-size: 0.9rem;
        }

        .info-row:last-child { border-bottom: none; }

        .info-label { color: var(--text-secondary); }
        .info-value { font-weight: 600; color: var(--text-primary); }

        .analysis-box {
            background: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 0.75rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.75rem;
        }

        .chain-path {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            align-items: center;
        }

        .chain-node {
            padding: 0.5rem 1rem;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            font-family: 'Orbitron', monospace;
            color: var(--blue);
            transition: all 0.3s ease;
        }

        .chain-node:hover {
            background: rgba(59, 130, 246, 0.2);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .chain-arrow {
            color: var(--blue);
            font-size: 1.25rem;
        }

        .keyword-tag {
            display: inline-block;
            padding: 0.35rem 0.65rem;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: var(--radius-sm);
            font-size: 0.75rem;
            color: var(--red);
            margin: 0.25rem;
        }

        .loading-container {
            text-align: center;
            padding: 4rem 2rem;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid var(--border-color);
            border-top-color: var(--blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            font-family: 'Orbitron', sans-serif;
            color: var(--blue);
            font-size: 1.1rem;
        }

        .error-container {
            text-align: center;
            padding: 4rem 2rem;
        }

        .error-icon {
            font-size: 4rem;
            color: var(--red);
            margin-bottom: 1rem;
        }

        .error-text {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .risk-summary {
            background: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 1rem;
            margin-top: 1rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .progress-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        @media (max-width: 768px) {
            .main-container { padding: 1rem; }
            .page-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="/">
                <i class="bi bi-shield-check me-2"></i>
                PHISHING DETECTOR
            </a>
            <div class="d-flex gap-2">
                <a href="/" class="btn-nav">
                    <i class="bi bi-house"></i> 首页
                </a>
                <a id="reportLink" href="/" class="btn-nav">
                    <i class="bi bi-file-text"></i> 返回报告
                </a>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <div class="page-header">
            <div>
                <h1 class="page-title">
                    <i class="bi bi-diagram-3"></i>
                    溯源分析报告
                </h1>
                <p class="page-subtitle">邮件攻击来源与意图深度分析</p>
            </div>
            <div id="alertInfo" style="text-align: right; font-size: 0.85rem; color: var(--text-muted);"></div>
        </div>

        <div id="loadingState" class="card-cyber">
            <div class="loading-container">
                <div class="loading-spinner"></div>
                <div class="loading-text">正在加载溯源分析...</div>
            </div>
        </div>

        <div id="mainContent" style="display: none;">
            <div class="card-cyber">
                <div class="card-header-cyber">
                    <i class="bi bi-shield-check" style="color: var(--blue);"></i>
                    <h5 class="card-title-cyber">综合风险评估</h5>
                </div>
                <div class="card-body-cyber">
                    <div style="display: flex; align-items: center; gap: 2rem; flex-wrap: wrap;">
                        <div id="riskBadge"></div>
                        <div style="flex: 1; min-width: 200px;">
                            <div class="progress-cyber">
                                <div id="riskProgress" class="progress-fill-cyber" style="width: 0%;"></div>
                            </div>
                            <div class="progress-labels">
                                <span>低风险</span>
                                <span>中风险</span>
                                <span>高风险</span>
                            </div>
                        </div>
                    </div>
                    <div id="riskSummary" class="risk-summary"></div>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-md-6">
                    <div class="dimension-card">
                        <div class="dimension-header">
                            <div class="dimension-icon red"><i class="bi bi-bullseye"></i></div>
                            <div class="dimension-title">攻击目标</div>
                        </div>
                        <div class="dimension-body" id="targetsContent"></div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="dimension-card">
                        <div class="dimension-header">
                            <div class="dimension-icon blue"><i class="bi bi-geo-alt"></i></div>
                            <div class="dimension-title">IP来源与传播链</div>
                        </div>
                        <div class="dimension-body" id="sourceContent"></div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="dimension-card">
                        <div class="dimension-header">
                            <div class="dimension-icon amber"><i class="bi bi-person-exclamation"></i></div>
                            <div class="dimension-title">攻击特性（社会工程学）</div>
                        </div>
                        <div class="dimension-body" id="socialContent"></div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="dimension-card">
                        <div class="dimension-header">
                            <div class="dimension-icon purple"><i class="bi bi-box"></i></div>
                            <div class="dimension-title">攻击载体</div>
                        </div>
                        <div class="dimension-body" id="vectorsContent"></div>
                    </div>
                </div>

                <div class="col-12">
                    <div class="dimension-card">
                        <div class="dimension-header">
                            <div class="dimension-icon green"><i class="bi bi-lightbulb"></i></div>
                            <div class="dimension-title">攻击动机与意图</div>
                        </div>
                        <div class="dimension-body" id="motivationContent"></div>
                    </div>
                </div>
            </div>

            <div class="card-cyber" id="chainCard" style="display: none;">
                <div class="card-header-cyber">
                    <i class="bi bi-signpost-split" style="color: var(--blue);"></i>
                    <h5 class="card-title-cyber">传播链路径</h5>
                </div>
                <div class="card-body-cyber">
                    <div id="chainPath" class="chain-path"></div>
                </div>
            </div>
        </div>

        <div id="errorState" class="card-cyber" style="display: none;">
            <div class="error-container">
                <i class="bi bi-exclamation-triangle error-icon"></i>
                <div class="error-text" id="errorMessage">加载失败</div>
            </div>
        </div>
    </div>

    <script>
        let alertId = null;

        function getAlertId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        async function loadTraceback() {
            alertId = getAlertId();

            if (!alertId) {
                showError('未指定邮件ID');
                return;
            }

            document.getElementById('reportLink').href = `/report.html?id=${alertId}`;
            document.getElementById('alertInfo').textContent = `邮件ID: ${alertId}`;

            try {
                const response = await fetch(`/api/alerts/${alertId}/traceback`);

                if (!response.ok) {
                    throw new Error('加载失败');
                }

                const data = await response.json();

                if (data.error) {
                    showError(data.error);
                    return;
                }

                displayTraceback(data);

            } catch (e) {
                showError(e.message);
            }
        }

        function displayTraceback(data) {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';

            const dims = data.dimensions || {};

            displayRiskAssessment(data);
            displayTargets(dims.targets || {});
            displaySourceChain(dims.source_chain || {});
            displaySocialEngineering(dims.social_engineering || {});
            displayAttackVectors(dims.attack_vectors || {});
            displayMotivation(dims.motivation || {});

            const chain = dims.source_chain || {};
            if (chain.hops && chain.hops.length > 0) {
                displayChainPath(chain.hops);
                document.getElementById('chainCard').style.display = 'block';
            }
        }

        function displayRiskAssessment(data) {
            const score = data.risk_score || 0;
            const scorePercent = Math.round(score * 100);

            let riskClass = 'low';
            let riskLabel = '低风险';
            if (score > 0.6) { riskClass = 'high'; riskLabel = '高风险'; }
            else if (score > 0.3) { riskClass = 'medium'; riskLabel = '中风险'; }

            document.getElementById('riskBadge').innerHTML = `
                <span class="risk-badge risk-${riskClass}">
                    <i class="bi bi-shield-${riskClass === 'high' ? 'x' : 'check'}"></i>
                    ${riskLabel}
                </span>
            `;

            const progress = document.getElementById('riskProgress');
            progress.style.width = `${scorePercent}%`;
            progress.className = `progress-fill-cyber ${riskClass}`;

            document.getElementById('riskSummary').textContent = data.summary || '暂无分析结果';
        }

        function displayTargets(targets) {
            const content = document.getElementById('targetsContent');

            content.innerHTML = `
                <div class="info-row">
                    <span class="info-label">收件人数量</span>
                    <span class="info-value">${targets.total_count || 0}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">攻击类型</span>
                    <span class="info-value">${getRiskLabel(targets.risk_level)}</span>
                </div>
                <div class="info-row" style="border: none;">
                    <span class="info-label">分析结论</span>
                </div>
                <div class="analysis-box">
                    ${targets.analysis || '暂无分析'}
                </div>
            `;
        }

        function displaySourceChain(chain) {
            const content = document.getElementById('sourceContent');
            const geo = chain.geolocation || {};

            content.innerHTML = `
                <div class="info-row">
                    <span class="info-label">源IP地址</span>
                    <span class="info-value" style="font-family: 'Orbitron', monospace;">${chain.source_ip || '未知'}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">地理位置</span>
                    <span class="info-value">${geo.country || '未知'}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">ISP</span>
                    <span class="info-value">${geo.isp || '未知'}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">传输跳数</span>
                    <span class="info-value">${chain.hops?.length || 0}</span>
                </div>
                <div class="info-row" style="border: none;">
                    <span class="info-label">分析结论</span>
                </div>
                <div class="analysis-box">
                    ${chain.analysis || '暂无分析'}
                </div>
            `;
        }

        function displaySocialEngineering(se) {
            const content = document.getElementById('socialContent');
            const categories = se.categories || [];
            const keywords = se.detected_keywords || [];

            content.innerHTML = `
                <div class="info-row">
                    <span class="info-label">检测到类型</span>
                    <span class="info-value">${categories.length > 0 ? categories.join(', ') : '无'}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">匹配关键词</span>
                    <span class="info-value">${keywords.length} 个</span>
                </div>
                ${keywords.length > 0 ? `
                    <div style="margin-top: 0.5rem;">
                        ${keywords.slice(0, 8).map(kw => `<span class="keyword-tag">${kw.keyword}</span>`).join('')}
                        ${keywords.length > 8 ? `<span style="font-size: 0.75rem; color: var(--text-muted);">+${keywords.length - 8} more</span>` : ''}
                    </div>
                ` : ''}
                <div class="analysis-box">
                    ${se.analysis || '暂无分析'}
                </div>
            `;
        }

        function displayAttackVectors(vectors) {
            const content = document.getElementById('vectorsContent');
            const links = vectors.malicious_links || [];
            const attachments = vectors.suspicious_attachments || [];

            content.innerHTML = `
                <div class="info-row">
                    <span class="info-label">可疑链接</span>
                    <span class="info-value">${links.length} 个</span>
                </div>
                <div class="info-row">
                    <span class="info-label">危险附件</span>
                    <span class="info-value">${attachments.length} 个</span>
                </div>
                <div class="info-row">
                    <span class="info-label">信息窃取请求</span>
                    <span class="info-value">${vectors.info_theft_request ? '是' : '否'}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">二维码</span>
                    <span class="info-value">${vectors.qr_codes || 0} 个</span>
                </div>
                <div class="analysis-box">
                    ${vectors.analysis || '暂无分析'}
                </div>
            `;
        }

        function displayMotivation(motivation) {
            const content = document.getElementById('motivationContent');

            content.innerHTML = `
                <div class="row">
                    <div class="col-md-6">
                        <div class="info-row">
                            <span class="info-label">主要动机</span>
                            <span class="info-value">${motivation.primary_label || '未知'}</span>
                        </div>
                        <div class="info-row" style="border: none;">
                            <span class="info-label">置信度</span>
                            <span class="info-value">${Math.round((motivation.confidence || 0) * 100)}%</span>
                        </div>
                        <div class="progress-cyber">
                            <div class="progress-fill-cyber ${motivation.confidence > 0.7 ? 'high' : motivation.confidence > 0.4 ? 'medium' : 'low'}" 
                                 style="width: ${(motivation.confidence || 0) * 100}%;"></div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="analysis-box" style="height: 100%;">
                            ${motivation.analysis || '暂无分析'}
                        </div>
                    </div>
                </div>
            `;
        }

        function displayChainPath(hops) {
            const container = document.getElementById('chainPath');

            container.innerHTML = hops.map((hop, i) => `
                <span class="chain-node" title="${hop.server || ''}">
                    ${hop.ip || hop.server || '?'}
                </span>
                ${i < hops.length - 1 ? '<span class="chain-arrow"><i class="bi bi-arrow-right"></i></span>' : ''}
            `).join('');
        }

        function getRiskLabel(level) {
            const labels = { 'high': '高风险', 'medium': '中风险', 'low': '低风险' };
            return labels[level] || '未知';
        }

        function showError(message) {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('errorState').style.display = 'block';
            document.getElementById('errorMessage').textContent = message;
        }

        document.addEventListener('DOMContentLoaded', loadTraceback);
    </script>
</body>
</html>
